name = "chiyigo-com"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# 注意：Cloudflare Pages 不會合併 wrangler.toml [vars] 與 dashboard 設的環境變數，
# 同 key 衝突時部署會失敗。其他 env vars (IAM_BASE_URL / MAIL_FROM_ADDRESS /
# RESEND_API_KEY 等) 由 Pages dashboard 管理。
# ENVIRONMENT 在本機跑 `wrangler pages dev` 時會被 .dev.vars 覆寫成 development，
# 兩處同名但值刻意不同，分別給 prod / local 用，請勿合併或刪除任一邊。
[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "chiyigo_db"
database_name = "chiyigo_db"
database_id = "59f73214-1203-44b7-840f-86cb3998fbb6"

# KV cache（read-heavy hot path，非 source of truth）
# 用途：JWKS / revoked_jti / oauth_clients 等 lookup 快取
# 建立步驟：
#   wrangler kv namespace create CHIYIGO_KV
#   把回傳的 id 填入下方，並在 Cloudflare Pages dashboard
#   Settings → Functions → KV namespace bindings 也加同一組
[[kv_namespaces]]
binding = "CHIYIGO_KV"
id = "e3ca0c13ce5a4ec9aee7d550b0596e04"

[ai]
binding = "AI"

# R2 bucket：audit_log 冷存（F-3 Phase 2，docs/AUDIT_RETENTION_PLAN.md）
#
# 歷史：P1-18（2026-05-09 commit ebd44d2）由 cron cleanup.js 寫 plain JSONL 進來，
#      路徑無 manifest / 無 sha256 verify / 無 chunk state；codex round-3 H-1 指出
#      此路徑與 Phase 2 設計不相容。
# 現況：PR 0 Step 0.1（2026-05-10）已從 cleanup.js 移除 archiveAndDeleteAuditLog。
#      此 binding 暫不會被 runtime 寫入；保留供 Phase 2 archive worker 接手。
# Bucket 狀態：object_count=0（2026-05-10 wrangler r2 bucket info 確認）
#      舊路徑雖 deploy 但 audit_log 累積不滿 1 年，從未實際寫過任何 R2 物件。
#      → Phase 2 不需處理 legacy data，archive worker 直接寫 v6 schema 即可。
[[r2_buckets]]
binding     = "AUDIT_ARCHIVE_BUCKET"
bucket_name = "chiyigo-audit-archive"

# F-3 Phase 2 PR 0.2c-pre-1b.1（2026-05-24，TEMPORARY）— Worker binding canary
#
# 為什麼存在：PR 0.2c-pre-1b spike 用 S3 sigv4 + limited token 親驗 R2 retention
#            lock enforce same-key PUT-overwrite + DELETE。**但 prod cron 走 worker
#            binding（account-level），與 wrangler 同位階。spike 路徑不代表 binding
#            路徑同樣行為**（codex r1 P1 點明的 gap）。本 binding 是給臨時
#            /api/admin/cron/r2-binding-canary endpoint 用，對 preview bucket 跑
#            put_overwrite / put_new / delete 三 op，捕捉真實 binding error shape
#            並對齊 isR2LockError classifier。
#
# 為什麼是 preview bucket：與 1b spike 對齊（同 bucket → 同 lock 設定），且
#            preview bucket 上的 lock 是 throwaway（1-day retention + 2-day
#            lifecycle），不影響 prod 資料。
#
# 何時移除：commit 2 of PR 0.2c-pre-1b.1（一旦 canary 跑完、outcome 寫進 runbook
#          + fixture）。此 binding 與 r2-binding-canary.ts endpoint **同 PR 一起
#          移除**，避免 prod 殘留 R2 binding。
#
# 🔴 紀律：本 binding 唯一允許的 caller 是 r2-binding-canary.ts；其他 archive
#         worker code 一律 grep AUDIT_ARCHIVE_BUCKET_PREVIEW 應為 0 hit（除本文件
#         + types/env.d.ts + canary endpoint + canary tests）。
[[r2_buckets]]
binding     = "AUDIT_ARCHIVE_BUCKET_PREVIEW"
bucket_name = "chiyigo-audit-archive-preview"

# 註：Pages Direct Upload 模式不支援 wrangler.toml [observability] 區塊
# （Workers 才有）。Pages Functions 看 console.log 的方法：
#   1) Cloudflare Dashboard → Workers & Pages → chiyigo-com → 任一 deployment
#      → View details → Functions → Real-time logs（即時串流）
#   2) wrangler pages deployment tail --project-name chiyigo-com
# 想長期保存 / 過濾，需把 console.log 主動寫進外部服務（Logflare 等）。
