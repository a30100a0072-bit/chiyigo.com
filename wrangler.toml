name = "chiyigo-com"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# 注意：Cloudflare Pages 不會合併 wrangler.toml [vars] 與 dashboard 設的環境變數，
# 同 key 衝突時部署會失敗。其他 env vars (IAM_BASE_URL / MAIL_FROM_ADDRESS /
# RESEND_API_KEY 等) 由 Pages dashboard 管理。
[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "chiyigo_db"
database_name = "chiyigo_db"
database_id = "59f73214-1203-44b7-840f-86cb3998fbb6"

[ai]
binding = "AI"

# Cloudflare Workers Logs / Observability：必啟用，否則 console.log 不會進
# Dashboard → Observability。Pages 預設關閉（與 Workers 不同），需明示。
# head_sampling_rate=1 = 100% 取樣，流量小階段這樣設沒成本問題。
[observability]
enabled = true
head_sampling_rate = 1
