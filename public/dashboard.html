<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的帳號 — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:   { 500: "#4f6ef7", 600: "#3b55e6", 700: "#2d42cc" },
            surface: { DEFAULT: "#0e0e12", card: "#16161d", border: "#2a2a35" },
          },
          fontFamily: { sans: ["Inter", "Noto Sans TC", "sans-serif"] },
          keyframes: {
            fadeUp: { "0%": { opacity:"0", transform:"translateY(20px)" }, "100%": { opacity:"1", transform:"translateY(0)" } },
          },
          animation: { "fade-up": "fadeUp 0.5s ease forwards" },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0e0e12; color: #e4e4ef; }
    .lang-bar{display:flex;gap:.375rem;align-items:center}
    .lang-pill{background:none;border:1px solid #2a2a35;border-radius:6px;padding:.2rem .55rem;font-size:.7rem;color:#6b7280;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s}
    .lang-pill:hover,.lang-pill.active{border-color:#4f6ef7;color:#4f6ef7}
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- 頂部工具列 -->
  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/index.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span data-i18n="back_home">返回首頁</span>
      </a>
      <div class="flex items-center gap-3">
        <span class="text-sm font-semibold text-white tracking-tight">CHIYIGO</span>
        <div class="lang-bar">
          <button class="lang-pill active" data-lang="zh-TW">繁中</button>
          <button class="lang-pill" data-lang="en">EN</button>
          <button class="lang-pill" data-lang="ja">日本語</button>
          <button class="lang-pill" data-lang="ko">한국어</button>
        </div>
      </div>
      <button onclick="logout()"
        class="flex items-center gap-1.5 text-sm text-gray-400 hover:text-red-400 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        <span data-i18n="logout_header">登出</span>
      </button>
    </div>
  </header>

  <!-- 主體 -->
  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md animate-fade-up">

      <!-- 載入中 -->
      <div id="loading" class="text-center py-20">
        <div class="inline-block w-8 h-8 border-2 border-brand-500/30 border-t-brand-500 rounded-full animate-spin"></div>
        <p class="text-gray-600 text-sm mt-3" data-i18n="loading_text">載入中…</p>
      </div>

      <!-- 用戶卡片（載入後顯示） -->
      <div id="user-card" class="hidden">

        <!-- 頭像 + 名稱 -->
        <div class="text-center mb-6">
          <div id="avatar-wrap" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-4">
            <svg class="w-8 h-8 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </div>
          <h1 class="text-xl font-bold text-white" id="user-email">—</h1>
          <div class="flex items-center justify-center gap-2 mt-2">
            <span id="role-badge" class="px-2.5 py-0.5 rounded-full text-xs font-semibold"></span>
            <span id="status-badge" class="px-2.5 py-0.5 rounded-full text-xs font-semibold"></span>
          </div>
        </div>

        <!-- 詳細資訊 -->
        <div class="rounded-2xl bg-[#16161d] border border-[#2a2a35] divide-y divide-[#2a2a35] shadow-2xl mb-4">
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-gray-500" data-i18n="lbl_email">電子信箱</span>
            <span id="info-email" class="text-sm text-white font-medium">—</span>
          </div>
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-gray-500" data-i18n="lbl_verified">Email 驗證</span>
            <span id="info-verified" class="text-sm font-medium">—</span>
          </div>
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-gray-500" data-i18n="lbl_providers">登入方式</span>
            <div id="info-providers" class="flex gap-1.5">—</div>
          </div>
          <div class="flex items-center justify-between px-5 py-4">
            <span class="text-sm text-gray-500" data-i18n="lbl_created">加入時間</span>
            <span id="info-created" class="text-sm text-gray-300">—</span>
          </div>
        </div>

        <!-- 2FA 管理區塊 -->
        <div id="tfa-section" class="hidden rounded-2xl bg-[#16161d] border border-[#2a2a35] shadow-2xl mb-4 overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4">
            <div class="flex items-center gap-3">
              <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
              </svg>
              <div>
                <p class="text-sm font-semibold text-white" data-i18n="tfa_title">雙重驗證（2FA）</p>
                <p id="tfa-status-text" class="text-xs text-gray-500 mt-0.5">載入中…</p>
              </div>
            </div>
            <span id="tfa-badge" class="px-2.5 py-1 rounded-full text-xs font-semibold"></span>
          </div>

          <!-- 啟用 / 停用按鈕 -->
          <div class="border-t border-[#2a2a35] px-5 py-3 flex gap-2">
            <button id="tfa-enable-btn" onclick="startSetup2FA()"
              class="hidden px-4 py-2 rounded-lg bg-brand-500/10 hover:bg-brand-500/20 border border-brand-500/20 text-brand-400 text-xs font-semibold transition-all">
              <span data-i18n="tfa_enable_btn">啟用 2FA</span>
            </button>
            <button id="tfa-disable-btn" onclick="showDisablePanel()"
              class="hidden px-4 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 text-xs font-semibold transition-all">
              <span data-i18n="tfa_disable_btn">停用 2FA</span>
            </button>
          </div>

          <!-- Setup 面板（啟用流程）-->
          <div id="tfa-setup-panel" class="hidden border-t border-[#2a2a35] px-5 py-5 space-y-4">
            <p class="text-xs text-gray-400" data-i18n="tfa_setup_hint">用 Google Authenticator 或任何 TOTP App 掃描 QR Code，然後輸入 6 位數驗證碼完成啟用。</p>
            <div class="flex flex-col items-center gap-3">
              <canvas id="tfa-qr" class="rounded-xl bg-white p-3"></canvas>
              <div class="text-center">
                <p class="text-xs text-gray-500 mb-1" data-i18n="tfa_manual_key">或手動輸入金鑰：</p>
                <code id="tfa-secret" class="text-xs text-brand-400 bg-brand-500/10 px-2 py-1 rounded select-all break-all"></code>
              </div>
            </div>
            <div class="flex gap-2">
              <input id="tfa-otp-input" type="text" inputmode="numeric" maxlength="6" placeholder="輸入 6 位數驗證碼" data-i18n-ph="tfa_otp_ph"
                class="flex-1 bg-[#0e0e12] border border-[#2a2a35] rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-brand-500/50 tracking-widest text-center" />
              <button onclick="confirmEnable2FA()"
                class="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-xs font-semibold transition-all">
                <span data-i18n="tfa_confirm_enable">確認啟用</span>
              </button>
            </div>
            <p id="tfa-setup-msg" class="hidden text-xs"></p>
          </div>

          <!-- Disable 面板（停用流程）-->
          <div id="tfa-disable-panel" class="hidden border-t border-[#2a2a35] px-5 py-5 space-y-3">
            <p class="text-xs text-amber-400" data-i18n="tfa_disable_warn">停用後需重新設定才能再次啟用。請輸入 Authenticator App 的驗證碼確認。</p>
            <div class="flex gap-2">
              <input id="tfa-disable-input" type="text" inputmode="numeric" maxlength="6" placeholder="輸入 6 位數驗證碼" data-i18n-ph="tfa_otp_ph"
                class="flex-1 bg-[#0e0e12] border border-[#2a2a35] rounded-lg px-3 py-2 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-red-500/50 tracking-widest text-center" />
              <button onclick="confirmDisable2FA()"
                class="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-xs font-semibold transition-all">
                <span data-i18n="tfa_confirm_disable">確認停用</span>
              </button>
            </div>
            <p id="tfa-disable-msg" class="hidden text-xs"></p>
          </div>

          <!-- 備用碼顯示（啟用成功後）-->
          <div id="tfa-backup-panel" class="hidden border-t border-[#2a2a35] px-5 py-5 space-y-3">
            <div class="flex items-start gap-2 rounded-lg bg-amber-500/5 border border-amber-500/20 p-3">
              <svg class="w-4 h-4 text-amber-400 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" /></svg>
              <p class="text-xs text-amber-300" data-i18n-html="tfa_backup_warn">請立即抄下這 10 組備用碼，之後<strong>無法再次查看</strong>。每組只能使用一次。</p>
            </div>
            <div id="tfa-backup-codes" class="grid grid-cols-2 gap-1.5"></div>
            <button onclick="closeTfaBackup()"
              class="w-full py-2 rounded-lg bg-green-500/10 hover:bg-green-500/20 border border-green-500/20 text-green-400 text-xs font-semibold transition-all">
              <span data-i18n="tfa_backup_done">我已抄寫完畢</span>
            </button>
          </div>
        </div>

        <!-- Email 未驗證提示 -->
        <div id="email-banner" class="hidden mb-4 rounded-xl bg-amber-500/5 border border-amber-500/20 px-5 py-4">
          <div class="flex items-center justify-between gap-4">
            <div>
              <p class="text-sm font-medium text-amber-300" data-i18n="email_unverified">Email 尚未驗證</p>
              <p class="text-xs text-gray-500 mt-0.5" data-i18n="email_unverified_sub">驗證後可使用完整帳號功能</p>
            </div>
            <button id="resend-btn" onclick="sendVerification()"
              class="shrink-0 px-3 py-1.5 rounded-lg bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/25 text-amber-300 text-xs font-semibold transition-all disabled:opacity-40 disabled:cursor-not-allowed">
              <span data-i18n="resend_btn">重發驗證信</span>
            </button>
          </div>
          <p id="resend-msg" class="hidden text-xs mt-2 text-gray-400"></p>
        </div>

        <!-- 登出按鈕 -->
        <button onclick="logout()"
          class="w-full py-3 rounded-xl border border-red-500/20 bg-red-500/5 hover:bg-red-500/10 text-red-400 font-semibold text-sm transition-all hover:scale-[1.01] active:scale-[0.99]">
          <span data-i18n="logout_btn">登出帳號</span>
        </button>

      </div>

      <!-- 錯誤畫面 -->
      <div id="error-card" class="hidden text-center py-20">
        <p class="text-red-400 text-sm mb-4" id="error-msg" data-i18n="load_fail">載入失敗</p>
        <a href="/login.html" class="text-brand-500 hover:text-brand-600 text-sm transition-colors" data-i18n="relogin_link">← 重新登入</a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="/js/auth-ui.js?v=6"></script>

        tfa_manual_key:'또는 키를 직접 입력:', tfa_otp_ph:'6자리 코드 입력',
        tfa_confirm_enable:'활성화 확인', tfa_confirm_disable:'비활성화 확인',
        tfa_disable_warn:'비활성화 후 다시 설정해야 재활성화할 수 있습니다. 인증 코드를 입력하여 확인하세요.',
        tfa_backup_warn:'지금 바로 이 10개의 백업 코드를 기록해 두세요. <strong>다시 볼 수 없습니다</strong>. 각 코드는 한 번만 사용 가능합니다.',
        tfa_backup_done:'저장 완료',
        email_unverified:'이메일 미인증', email_unverified_sub:'인증 후 모든 기능을 사용할 수 있습니다',
        resend_btn:'인증 메일 재발송', logout_btn:'로그아웃',
        load_fail:'로드 실패', relogin_link:'← 다시 로그인',
        role_developer:'개발자', role_admin:'관리자', role_moderator:'모더레이터', role_player:'플레이어',
        provider_local:'비밀번호 로그인',
        status_active:'정상', verified_yes:'인증됨', verified_no:'미인증',
        tfa_badge_on:'활성화됨', tfa_badge_off:'비활성화됨',
        tfa_text_on:'계정이 2FA로 보호되고 있습니다', tfa_text_off:'보안 강화를 위해 2FA 활성화를 권장합니다',
        err_profile:'계정 정보를 불러올 수 없습니다. 새로고침하거나 다시 로그인해 주세요.',
        btn_loading:'잠시만요…', btn_sending:'전송 중…',
        resend_sent:'인증 메일이 전송되었습니다. 받은 편지함을 확인하세요（1시간 유효）。',
        resend_wait:'잠시 후 다시 시도해 주세요.', resend_fail:'전송 실패. 나중에 다시 시도해 주세요.',
        net_err:'네트워크 오류. 나중에 다시 시도해 주세요.',
        totp_err6:'6자리 코드를 입력해 주세요',
        setup_fail:'설정 실패', enable_fail:'활성화 실패', disable_fail:'비활성화 실패',
        resend_timer_label:'재발송（${s}s）',
      },
    };

    let curLangD = localStorage.getItem('lang') || 'zh-TW';
    function T(key) { return (LANGS_D[curLangD] || LANGS_D['zh-TW'])[key] ?? (LANGS_D['zh-TW'][key] ?? key); }

    function applyLangD(lang) {
      curLangD = lang;
      localStorage.setItem('lang', lang);
      const t = LANGS_D[lang] || LANGS_D['zh-TW'];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n; if (t[k] !== undefined) el.textContent = t[k];
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const k = el.dataset.i18nHtml; if (t[k] !== undefined) el.innerHTML = t[k];
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const k = el.dataset.i18nPh; if (t[k] !== undefined) el.placeholder = t[k];
      });
      document.querySelectorAll('.lang-pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      // re-render any already-rendered dynamic UI
      const tfaBadge = document.getElementById('tfa-badge');
      const tfaText  = document.getElementById('tfa-status-text');
      if (tfaBadge && tfaBadge.dataset.tfaState) {
        const on = tfaBadge.dataset.tfaState === 'on';
        tfaBadge.textContent = on ? T('tfa_badge_on') : T('tfa_badge_off');
        if (tfaText) tfaText.textContent = on ? T('tfa_text_on') : T('tfa_text_off');
      }
    }

    // lang switcher
    document.querySelectorAll('.lang-pill').forEach(btn => {
      btn.addEventListener('click', () => applyLangD(btn.dataset.lang));
    });
    applyLangD(curLangD);

    const ROLE_STYLE = {
      developer: 'bg-purple-500/15 text-purple-300 border border-purple-500/20',
      admin:     'bg-red-500/15 text-red-300 border border-red-500/20',
      moderator: 'bg-amber-500/15 text-amber-300 border border-amber-500/20',
      player:    'bg-brand-500/15 text-brand-300 border border-brand-500/20',
    };

    function formatDate(str) {
      if (!str) return '—';
      const d = new Date(str.replace(' ', 'T') + 'Z');
      return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function loadProfile() {
      const token = sessionStorage.getItem('access_token');
      if (!token) { window.location.href = '/login.html'; return; }

      try {
        let res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token },
        });

        // access_token 過期 → 嘗試靜默刷新一次，成功後重試
        if (res.status === 401) {
          const ok = await refreshAccessToken();
          if (!ok) {
            sessionStorage.removeItem('access_token');
            window.location.href = '/login.html';
            return;
          }
          res = await fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('access_token') },
          });
        }

        if (res.status === 403) {
          sessionStorage.removeItem('access_token');
          window.location.href = '/login.html';
          return;
        }

        if (!res.ok) throw new Error('Server error');

        const data = await res.json();

        document.getElementById('user-email').textContent   = data.email;
        document.getElementById('info-email').textContent   = data.email;
        document.getElementById('info-created').textContent = formatDate(data.created_at);

        const roleBadge = document.getElementById('role-badge');
        roleBadge.textContent = T('role_' + data.role) || data.role;
        roleBadge.className = 'px-2.5 py-0.5 rounded-full text-xs font-semibold ' + (ROLE_STYLE[data.role] ?? ROLE_STYLE.player);

        const statusBadge = document.getElementById('status-badge');
        statusBadge.textContent = data.status === 'active' ? T('status_active') : data.status;
        statusBadge.className = 'px-2.5 py-0.5 rounded-full text-xs font-semibold ' +
          (data.status === 'active'
            ? 'bg-green-500/15 text-green-300 border border-green-500/20'
            : 'bg-red-500/15 text-red-300 border border-red-500/20');

        const verifiedEl = document.getElementById('info-verified');
        verifiedEl.textContent = data.email_verified ? T('verified_yes') : T('verified_no');
        verifiedEl.className   = 'text-sm font-medium ' + (data.email_verified ? 'text-green-400' : 'text-amber-400');

        document.getElementById('email-banner').classList.toggle('hidden', !!data.email_verified);

        const providersEl = document.getElementById('info-providers');
        const PROVIDER_ICON_FN = (p) => p === 'discord'
          ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs bg-[#5865F2]/15 text-[#5865F2] border border-[#5865F2]/20">Discord</span>`
          : p === 'local'
          ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs bg-gray-500/15 text-gray-300 border border-gray-500/20">${T('provider_local')}</span>`
          : `<span class="text-xs text-gray-500">${p}</span>`;
        const icons = (data.identities ?? []).map(i => PROVIDER_ICON_FN(i.provider));
        if (icons.length === 0) icons.push(PROVIDER_ICON_FN('local'));
        providersEl.innerHTML = icons.join('');

        // 2FA 區塊
        render2FASection(data.totp_enabled ?? false);

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('user-card').classList.remove('hidden');

      } catch {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-card').classList.remove('hidden');
        document.getElementById('error-msg').textContent = T('err_profile');
      }
    }

    loadProfile();

    // ── 2FA 管理 ─────────────────────────────────────────────────

    function render2FASection(enabled) {
      document.getElementById('tfa-section').classList.remove('hidden');
      const badge = document.getElementById('tfa-badge');
      const text  = document.getElementById('tfa-status-text');
      badge.dataset.tfaState = enabled ? 'on' : 'off';
      if (enabled) {
        badge.textContent  = T('tfa_badge_on');
        badge.className    = 'px-2.5 py-1 rounded-full text-xs font-semibold bg-green-500/15 text-green-300 border border-green-500/20';
        text.textContent   = T('tfa_text_on');
        document.getElementById('tfa-enable-btn').classList.add('hidden');
        document.getElementById('tfa-disable-btn').classList.remove('hidden');
      } else {
        badge.textContent  = T('tfa_badge_off');
        badge.className    = 'px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-500/15 text-gray-400 border border-gray-500/20';
        text.textContent   = T('tfa_text_off');
        document.getElementById('tfa-enable-btn').classList.remove('hidden');
        document.getElementById('tfa-disable-btn').classList.add('hidden');
      }
      document.getElementById('tfa-setup-panel').classList.add('hidden');
      document.getElementById('tfa-disable-panel').classList.add('hidden');
      document.getElementById('tfa-backup-panel').classList.add('hidden');
    }

    async function startSetup2FA() {
      const token = sessionStorage.getItem('access_token');
      const btn   = document.getElementById('tfa-enable-btn');
      btn.disabled = true; btn.querySelector('[data-i18n]').textContent = T('btn_loading');
      try {
        const res  = await fetch('/api/auth/2fa/setup', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
        const data = await res.json();
        if (!res.ok) { alert(data.error ?? T('setup_fail')); btn.disabled = false; btn.querySelector('[data-i18n]').textContent = T('tfa_enable_btn'); return; }
        document.getElementById('tfa-secret').textContent = data.secret;
        await QRCode.toCanvas(document.getElementById('tfa-qr'), data.otpauth_uri, { width: 180, margin: 1 });
        document.getElementById('tfa-setup-panel').classList.remove('hidden');
        document.getElementById('tfa-otp-input').value = '';
        document.getElementById('tfa-setup-msg').classList.add('hidden');
      } catch { alert(T('net_err')); }
      btn.disabled = false; btn.querySelector('[data-i18n]').textContent = T('tfa_enable_btn');
    }

    async function confirmEnable2FA() {
      const token = sessionStorage.getItem('access_token');
      const otp   = document.getElementById('tfa-otp-input').value.trim();
      const msg   = document.getElementById('tfa-setup-msg');
      if (!/^\d{6}$/.test(otp)) { showTfaMsg(msg, T('totp_err6'), 'err'); return; }
      try {
        const res  = await fetch('/api/auth/2fa/activate', {
          method: 'POST', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ otp_code: otp }),
        });
        const data = await res.json();
        if (!res.ok) { showTfaMsg(msg, data.error ?? T('enable_fail'), 'err'); return; }
        // 顯示備用碼
        const codesEl = document.getElementById('tfa-backup-codes');
        codesEl.innerHTML = data.backup_codes.map(c =>
          `<code class="block text-center text-xs font-mono bg-[#0e0e12] border border-[#2a2a35] rounded-lg px-2 py-1.5 text-gray-300 select-all">${c}</code>`
        ).join('');
        document.getElementById('tfa-setup-panel').classList.add('hidden');
        document.getElementById('tfa-backup-panel').classList.remove('hidden');
        render2FASection(true);
      } catch { showTfaMsg(msg, T('net_err'), 'err'); }
    }

    function closeTfaBackup() {
      document.getElementById('tfa-backup-panel').classList.add('hidden');
    }

    function showDisablePanel() {
      document.getElementById('tfa-setup-panel').classList.add('hidden');
      document.getElementById('tfa-disable-panel').classList.toggle('hidden');
      document.getElementById('tfa-disable-input').value = '';
      document.getElementById('tfa-disable-msg').classList.add('hidden');
    }

    async function confirmDisable2FA() {
      const token = sessionStorage.getItem('access_token');
      const otp   = document.getElementById('tfa-disable-input').value.trim();
      const msg   = document.getElementById('tfa-disable-msg');
      if (!/^\d{6}$/.test(otp)) { showTfaMsg(msg, T('totp_err6'), 'err'); return; }
      try {
        const res  = await fetch('/api/auth/2fa/disable', {
          method: 'POST', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ otp_code: otp }),
        });
        const data = await res.json();
        if (!res.ok) { showTfaMsg(msg, data.error ?? T('disable_fail'), 'err'); return; }
        render2FASection(false);
      } catch { showTfaMsg(msg, T('net_err'), 'err'); }
    }

    function showTfaMsg(el, text, type) {
      el.textContent = text;
      el.className   = 'text-xs ' + (type === 'err' ? 'text-red-400' : 'text-green-400');
    }

    async function sendVerification() {
      const btn = document.getElementById('resend-btn');
      const msg = document.getElementById('resend-msg');
      const token = sessionStorage.getItem('access_token');
      if (!token) { window.location.href = '/login.html'; return; }

      btn.disabled = true;
      btn.querySelector('[data-i18n]').textContent = T('btn_sending');
      msg.className = 'hidden text-xs mt-2';

      try {
        const res  = await fetch('/api/auth/email/send-verification', {
          method:  'POST',
          headers: { 'Authorization': 'Bearer ' + token },
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          showResendMsg(T('resend_sent'), 'ok');
          startResendCooldown(60);
          return;
        }
        if (res.status === 400) {
          // email 已驗證，重新載入資料更新 UI
          loadProfile();
          return;
        }
        if (res.status === 429) {
          const wait = data.retry_after ?? 60;
          showResendMsg(T('resend_wait'), 'warn');
          startResendCooldown(wait);
          return;
        }
        showResendMsg(data.error ?? T('resend_fail'), 'err');
        btn.disabled = false;
        btn.querySelector('[data-i18n]').textContent = T('resend_btn');
      } catch {
        showResendMsg(T('net_err'), 'err');
        btn.disabled = false;
        btn.querySelector('[data-i18n]').textContent = T('resend_btn');
      }
    }

    function showResendMsg(text, type) {
      const msg = document.getElementById('resend-msg');
      msg.textContent = text;
      msg.className = 'text-xs mt-2 ' + (type === 'ok' ? 'text-green-400' : type === 'warn' ? 'text-amber-400' : 'text-red-400');
    }

    function startResendCooldown(seconds) {
      const btn = document.getElementById('resend-btn');
      const span = btn.querySelector('[data-i18n]');
      let remaining = seconds;
      btn.disabled = true;
      span.textContent = T('resend_timer_label').replace('${s}', remaining);
      const iv = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(iv);
          btn.disabled = false;
          span.textContent = T('resend_btn');
        } else {
          span.textContent = T('resend_timer_label').replace('${s}', remaining);
        }
      }, 1000);
    }

    // pagehide：頁面進入 bfcache 前重置 UI，確保還原時顯示 spinner 而非舊資料。
    window.addEventListener('pagehide', () => {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('user-card').classList.add('hidden');
      document.getElementById('error-card').classList.add('hidden');
    });

    // pageshow：bfcache 還原後重新驗證；pagehide 已重置 UI 所以無閃爍。
    window.addEventListener('pageshow', (event) => {
      if (!event.persisted) return;
      if (!sessionStorage.getItem('access_token')) {
        window.location.replace('/login.html');
      } else {
        loadProfile();
      }
    });
  </script>
</body>
</html>
