<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>忘記密碼 — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script>(function(){var s=localStorage.getItem('theme');document.documentElement.classList.add(s==='light'?'theme-light':'theme-dark')})();</script>
  <link rel="stylesheet" href="/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0e0e12; color: #e4e4ef; transition: background-color .3s ease, color .3s ease; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #16161d inset !important; -webkit-text-fill-color: #e4e4ef !important; }

    .theme-light body { background-color: #f5f6fa; color: #1a1b2e; }
    .theme-light .bg-\[\#0e0e12\] { background-color: #f0f2fa !important; }
    .theme-light .bg-\[\#0e0e12\]\/80 { background-color: rgba(245,246,250,.85) !important; }
    .theme-light .bg-\[\#16161d\] { background-color: #ffffff !important; }
    .theme-light .border-\[\#2a2a35\] { border-color: rgba(0,0,0,.10) !important; }
    .theme-light .text-white { color: #1a1b2e !important; }
    .theme-light .text-gray-400 { color: rgba(26,27,46,.65) !important; }
    .theme-light .text-gray-500 { color: rgba(26,27,46,.55) !important; }
    .theme-light .text-gray-600 { color: rgba(26,27,46,.45) !important; }
    .theme-light .placeholder-gray-600::placeholder { color: rgba(26,27,46,.40) !important; }
    .theme-light input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #ffffff inset !important; -webkit-text-fill-color: #1a1b2e !important; }
    .theme-light .hover\:text-white:hover { color: #1a1b2e !important; }

    .tool-btn { width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; border-radius:9px; border:1px solid #2a2a35; background:transparent; color:#9ca3af; cursor:pointer; transition:background .18s ease, color .18s ease, border-color .18s ease; }
    .tool-btn:hover { background:rgba(255,255,255,.05); color:#e4e4ef; }
    .theme-light .tool-btn { border-color:rgba(0,0,0,.10); color:rgba(26,27,46,.65); }
    .theme-light .tool-btn:hover { background:rgba(0,0,0,.05); color:#1a1b2e; }
    .tool-btn svg { width:16px; height:16px; }
    .lang-wrap { position:relative; }
    .lang-menu { position:absolute; top:calc(100% + 6px); right:0; min-width:140px; background:#16161d; border:1px solid #2a2a35; border-radius:10px; padding:.35rem; display:none; box-shadow:0 12px 28px rgba(0,0,0,.35); z-index:100; }
    .lang-menu.open { display:block; }
    .theme-light .lang-menu { background:#ffffff; border-color:rgba(0,0,0,.10); box-shadow:0 12px 28px rgba(0,0,0,.10); }
    .lang-opt { display:block; width:100%; text-align:left; padding:.45rem .7rem; font-size:.825rem; color:#cbd5e1; background:transparent; border:none; border-radius:7px; cursor:pointer; }
    .lang-opt:hover { background:rgba(255,255,255,.06); color:#fff; }
    .lang-opt.active { background:rgba(79,110,247,.15); color:#7c8df9; }
    .theme-light .lang-opt { color:rgba(26,27,46,.75); }
    .theme-light .lang-opt:hover { background:rgba(0,0,0,.05); color:#1a1b2e; }
    .theme-light .lang-opt.active { background:rgba(79,110,247,.10); color:#3b55e6; }

    /* Header logo (隨光暗切換) */
    .hdr-logo { height: 26px; width: auto; display: block; }
    .logo-dark, .theme-dark .logo-light { display: none !important; }
    .theme-dark .logo-dark { display: block !important; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/login.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span data-i18n="back_login">返回登入</span>
      </a>
      <a href="/" aria-label="CHIYIGO" class="flex items-center">
        <img src="/images/logo-light.png" alt="CHIYIGO" class="hdr-logo logo-light">
        <img src="/images/logo-dark.png"  alt="CHIYIGO" class="hdr-logo logo-dark">
      </a>
      <div class="flex items-center gap-2">
        <div class="lang-wrap">
          <button id="lang-btn" type="button" class="tool-btn" aria-label="Language">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m-9 9h18" />
            </svg>
          </button>
          <div id="lang-menu" class="lang-menu" role="menu">
            <button class="lang-opt" data-lang="zh-TW" role="menuitem">繁體中文</button>
            <button class="lang-opt" data-lang="en" role="menuitem">English</button>
            <button class="lang-opt" data-lang="ja" role="menuitem">日本語</button>
            <button class="lang-opt" data-lang="ko" role="menuitem">한국어</button>
          </div>
        </div>
        <button id="theme-btn" type="button" class="tool-btn" aria-label="Toggle theme">
          <svg id="theme-icon-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="theme-icon-light" class="hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md animate-fade-up">

      <div class="text-center mb-8 mt-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-4">
          <svg class="w-7 h-7 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 9v.906a2.25 2.25 0 01-1.183 1.981l-6.478 3.488M2.25 9v.906a2.25 2.25 0 001.183 1.981l6.478 3.488m8.839 2.51-4.66-2.51m0 0-1.023-.55a2.25 2.25 0 00-2.134 0l-1.022.55m0 0-4.661 2.51m16.5 1.615a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V8.844a2.25 2.25 0 011.183-1.98l7.5-4.04a2.25 2.25 0 012.134 0l7.5 4.04a2.25 2.25 0 011.183 1.98V19.5z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white" data-i18n="title">忘記密碼</h1>
        <p class="text-gray-500 text-sm mt-1" data-i18n="subtitle">輸入註冊信箱，我們將寄送重設連結</p>
      </div>

      <div class="rounded-2xl bg-[#16161d] border border-[#2a2a35] p-8 shadow-2xl">

        <div id="msg-box" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <form id="form-forgot" onsubmit="handleSubmit(event)">
          <div class="space-y-4">
            <div>
              <label for="email" class="block text-xs font-medium text-gray-400 mb-1.5" data-i18n="lbl_email">電子信箱</label>
              <input id="email" type="email" autocomplete="email" required
                placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
            </div>
          </div>
          <button type="submit" id="submit-btn"
            class="mt-6 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100" data-i18n="btn_submit">
            發送重設連結
          </button>
        </form>

        <div id="success-state" class="hidden text-center py-2">
          <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-green-500/10 border border-green-500/20 mb-4">
            <svg class="w-6 h-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
          </div>
          <p class="text-white font-semibold mb-1" data-i18n="success_title">信件已送出</p>
          <p class="text-gray-500 text-sm" data-i18n-html="success_desc">如果該信箱已註冊，你將在幾分鐘內收到重設連結。<br/>連結有效期為 1 小時。</p>
          <a href="/login.html"
            class="inline-block mt-6 px-6 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98]" data-i18n="btn_back_login">
            返回登入
          </a>
        </div>

      </div>

      <p class="text-center text-xs text-gray-600 mt-6" data-i18n="footer_note">
        你的資料由 CHIYIGO 安全保管，100% 資料主權。
      </p>
    </div>
  </main>

  <script>
    const I18N = {
      'zh-TW': {
        back_login:'返回登入', title:'忘記密碼', subtitle:'輸入註冊信箱，我們將寄送重設連結',
        lbl_email:'電子信箱', btn_submit:'發送重設連結', btn_back_login:'返回登入',
        success_title:'信件已送出', success_desc:'如果該信箱已註冊，你將在幾分鐘內收到重設連結。<br/>連結有效期為 1 小時。',
        footer_note:'你的資料由 CHIYIGO 安全保管，100% 資料主權。',
        loading:'送出中…', err_generic:'請求失敗，請稍後再試。', err_network:'網路錯誤，請檢查連線後重試。',
      },
      en: {
        back_login:'Back to login', title:'Forgot Password', subtitle:'Enter your registered email; we will send a reset link.',
        lbl_email:'Email', btn_submit:'Send reset link', btn_back_login:'Back to login',
        success_title:'Email sent', success_desc:'If this email is registered, you will receive a reset link in a few minutes.<br/>The link is valid for 1 hour.',
        footer_note:'Your data is securely held by CHIYIGO — 100% data sovereignty.',
        loading:'Sending…', err_generic:'Request failed, please try again later.', err_network:'Network error, please check your connection.',
      },
      ja: {
        back_login:'ログインに戻る', title:'パスワードをお忘れですか', subtitle:'登録メールアドレスを入力してください。再設定リンクをお送りします。',
        lbl_email:'メールアドレス', btn_submit:'再設定リンクを送信', btn_back_login:'ログインに戻る',
        success_title:'メールを送信しました', success_desc:'登録済みのメールアドレスであれば、数分以内に再設定リンクが届きます。<br/>有効期限は1時間です。',
        footer_note:'あなたのデータはCHIYIGOで安全に保管されます。データ主権100%。',
        loading:'送信中…', err_generic:'リクエストに失敗しました。後でもう一度お試しください。', err_network:'ネットワークエラーです。接続を確認してください。',
      },
      ko: {
        back_login:'로그인으로 돌아가기', title:'비밀번호를 잊으셨나요', subtitle:'가입된 이메일을 입력하시면 재설정 링크를 보내드립니다.',
        lbl_email:'이메일', btn_submit:'재설정 링크 보내기', btn_back_login:'로그인으로 돌아가기',
        success_title:'이메일을 보냈습니다', success_desc:'등록된 이메일이라면 몇 분 안에 재설정 링크가 도착합니다.<br/>링크는 1시간 동안 유효합니다.',
        footer_note:'귀하의 데이터는 CHIYIGO에서 안전하게 보관됩니다 — 데이터 주권 100%.',
        loading:'전송 중…', err_generic:'요청이 실패했습니다. 잠시 후 다시 시도해 주세요.', err_network:'네트워크 오류입니다. 연결을 확인해 주세요.',
      },
    };

    function getLang() { try { return localStorage.getItem('lang') || 'zh-TW' } catch { return 'zh-TW' } }
    function T(key) { const d = I18N[getLang()] || I18N['zh-TW']; return d[key] ?? key; }

    function applyLang(lang) {
      try { localStorage.setItem('lang', lang) } catch {}
      document.documentElement.lang = lang;
      const dict = I18N[lang] || I18N['zh-TW'];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n; if (dict[k] != null) el.textContent = dict[k];
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const k = el.dataset.i18nHtml; if (dict[k] != null) el.innerHTML = dict[k];
      });
      document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    }

    function applyTheme(isLight) {
      document.documentElement.classList.toggle('theme-light', isLight);
      document.documentElement.classList.toggle('theme-dark', !isLight);
      try { localStorage.setItem('theme', isLight ? 'light' : 'dark') } catch {}
      document.getElementById('theme-icon-dark').classList.toggle('hidden', isLight);
      document.getElementById('theme-icon-light').classList.toggle('hidden', !isLight);
    }

    document.addEventListener('DOMContentLoaded', () => {
      applyLang(getLang());
      applyTheme(document.documentElement.classList.contains('theme-light'));

      document.getElementById('theme-btn').addEventListener('click', () => {
        applyTheme(!document.documentElement.classList.contains('theme-light'));
      });
      const langMenu = document.getElementById('lang-menu');
      document.getElementById('lang-btn').addEventListener('click', e => {
        e.stopPropagation(); langMenu.classList.toggle('open');
      });
      langMenu.querySelectorAll('.lang-opt').forEach(opt => {
        opt.addEventListener('click', () => { applyLang(opt.dataset.lang); langMenu.classList.remove('open'); });
      });
      document.addEventListener('click', () => langMenu.classList.remove('open'));
    });

    async function handleSubmit(e) {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const email = document.getElementById('email').value.trim();
      const orig  = btn.textContent;

      setMsg('');
      btn.disabled = true;
      btn.textContent = T('loading');

      try {
        const res = await fetch('/api/auth/local/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });

        if (res.ok) {
          document.getElementById('form-forgot').classList.add('hidden');
          document.getElementById('success-state').classList.remove('hidden');
          return;
        }

        const data = await res.json().catch(() => ({}));
        setMsg(data.error ?? T('err_generic'), 'error');
      } catch {
        setMsg(T('err_network'), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = T('btn_submit');
      }
    }

    function setMsg(text, type = 'error') {
      const box = document.getElementById('msg-box');
      if (!text) { box.classList.add('hidden'); return; }
      box.textContent = text;
      box.className = type === 'error'
        ? 'mb-5 px-4 py-3 rounded-lg text-sm font-medium bg-red-500/10 border border-red-500/20 text-red-400'
        : 'mb-5 px-4 py-3 rounded-lg text-sm font-medium bg-green-500/10 border border-green-500/20 text-green-400';
    }
  </script>
</body>
</html>
