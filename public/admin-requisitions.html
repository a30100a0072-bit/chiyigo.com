<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>諮詢紀錄 — CHIYIGO Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:   { 500: "#6C6EE5", 600: "#5a5cc0", 700: "#4849a0" },
            surface: { DEFAULT: "#0e0e12", card: "#16161d", border: "#2a2a35" },
          },
          fontFamily: { sans: ["Inter", "Noto Sans TC", "sans-serif"], mono: ["DM Mono", "monospace"] },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>body { background: #0e0e12; color: #e4e4ef; }</style>
</head>
<body class="font-sans antialiased min-h-screen">

  <!-- Header -->
  <header class="fixed top-0 inset-x-0 z-50 border-b border-surface-border bg-surface/80 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/index.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
          <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
          首頁
        </a>
        <span class="text-surface-border">|</span>
        <span class="text-sm text-gray-400">Admin</span>
      </div>
      <span class="text-sm font-semibold text-white tracking-tight">CHIYIGO</span>
      <button id="logout-btn" class="flex items-center gap-1.5 text-sm text-gray-400 hover:text-red-400 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        登出
      </button>
    </div>
  </header>

  <main class="pt-14 px-6 pb-12 max-w-7xl mx-auto">

    <!-- Page title -->
    <div class="py-8 border-b border-surface-border mb-8">
      <p class="font-mono text-xs text-brand-500 tracking-widest mb-2">// admin panel</p>
      <h1 class="text-2xl font-bold text-white">接案諮詢紀錄</h1>
      <p class="text-sm text-gray-500 mt-1">來自 chiyigo.com/requisition 的表單提交</p>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-20 text-gray-500 text-sm font-mono">// 載入中…</div>

    <!-- Error -->
    <div id="error-msg" class="hidden text-center py-20">
      <p class="text-red-400 font-mono text-sm" id="error-text">// error</p>
      <a href="/login.html" class="mt-4 inline-block text-brand-500 text-sm hover:underline">→ 重新登入</a>
    </div>

    <!-- Content -->
    <div id="content" class="hidden">

      <!-- Controls -->
      <div class="flex flex-wrap items-center gap-3 mb-6">
        <div class="relative flex-1 min-w-[200px]">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="search-input" type="text" placeholder="搜尋姓名 / 聯絡方式 / 需求…"
            class="w-full bg-surface-card border border-surface-border rounded-lg pl-9 pr-4 py-2 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-500 transition-colors" />
        </div>
        <span id="total-badge" class="text-xs font-mono text-gray-500 shrink-0"></span>
      </div>

      <!-- Table (desktop) -->
      <div class="hidden md:block overflow-hidden rounded-xl border border-surface-border">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-surface-card border-b border-surface-border">
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider w-8">#</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider">姓名 / 公司</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider">聯絡方式</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider">需求類型</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider">預算</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider">時程</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider">提交時間</th>
              <th class="text-left px-4 py-3 text-xs font-mono text-gray-500 uppercase tracking-wider w-8"></th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-surface-border"></tbody>
        </table>
      </div>

      <!-- Cards (mobile) -->
      <div id="cards-container" class="md:hidden flex flex-col gap-3"></div>

      <!-- Pagination -->
      <div id="pagination" class="flex items-center justify-between mt-6"></div>

    </div>

    <!-- Detail modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
      <div class="bg-surface-card border border-surface-border rounded-2xl w-full max-w-xl max-h-[85vh] overflow-y-auto">
        <div class="flex items-center justify-between px-6 py-4 border-b border-surface-border">
          <h2 class="font-semibold text-white text-sm">諮詢詳情</h2>
          <button id="modal-close" class="text-gray-500 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div id="modal-body" class="px-6 py-5 space-y-4 text-sm"></div>
      </div>
    </div>

  </main>

  <script>
    const ACCESS_TOKEN_KEY = 'chiyigo_access_token'
    let currentPage = 1
    let currentQ    = ''
    let debounceTimer

    // ── Auth ──────────────────────────────────────────────────────
    function getToken() { return sessionStorage.getItem(ACCESS_TOKEN_KEY) }

    async function logout() {
      const token = getToken()
      if (token) {
        await fetch('/api/auth/logout', {
          method: 'POST',
          credentials: 'include',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        }).catch(() => {})
      }
      sessionStorage.clear()
      location.href = '/login.html'
    }
    document.getElementById('logout-btn').addEventListener('click', logout)

    // ── Fetch helpers ─────────────────────────────────────────────
    function showError(msg) {
      document.getElementById('loading').classList.add('hidden')
      document.getElementById('content').classList.add('hidden')
      document.getElementById('error-msg').classList.remove('hidden')
      document.getElementById('error-text').textContent = `// error: ${msg}`
    }

    function formatServiceType(v) {
      const map = {
        system: '系統開發 / 內部工具', web: '網站建置 / Landing Page',
        integration: '第三方串接 / 自動化', interactive: '互動體驗 / 品牌活動',
        branding: '品牌識別 / 視覺設計', marketing: '數位行銷 / SEO',
        other: '其他',
      }
      return map[v] ?? v
    }
    function formatBudget(v) {
      const map = {
        under30k: '< 30,000', '30k-80k': '30k–80k',
        '80k-200k': '80k–200k', over200k: '> 200,000', flexible: '彈性',
      }
      return map[v] ?? v ?? '—'
    }
    function formatTimeline(v) {
      const map = { asap: '越快越好', '1-3m': '1–3 個月', '3-6m': '3–6 個月', flexible: '彈性' }
      return map[v] ?? v ?? '—'
    }
    function formatDate(s) {
      if (!s) return '—'
      const d = new Date(s.replace(' ', 'T') + 'Z')
      return d.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
    }

    // ── Load data ─────────────────────────────────────────────────
    async function load(page = 1, q = '') {
      const token = getToken()
      if (!token) { showError('請先登入'); return }

      document.getElementById('loading').classList.remove('hidden')
      document.getElementById('content').classList.add('hidden')

      const params = new URLSearchParams({ page, limit: 20 })
      if (q) params.set('q', q)

      const res = await fetch(`/api/admin/requisitions?${params}`, {
        headers: { 'Authorization': `Bearer ${token}` },
      })

      if (res.status === 401 || res.status === 403) {
        showError('權限不足或登入已過期，請確認帳號具有 admin 角色')
        return
      }
      if (!res.ok) { showError(`HTTP ${res.status}`); return }

      const data = await res.json()
      document.getElementById('loading').classList.add('hidden')
      document.getElementById('content').classList.remove('hidden')

      renderTable(data.requisitions)
      renderCards(data.requisitions)
      renderPagination(data.total, data.page, data.limit)
      document.getElementById('total-badge').textContent = `共 ${data.total} 筆`
      currentPage = page
      currentQ    = q
    }

    // ── Table ─────────────────────────────────────────────────────
    function renderTable(rows) {
      const tbody = document.getElementById('table-body')
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-gray-600 font-mono text-xs">// no data</td></tr>`
        return
      }
      tbody.innerHTML = rows.map(r => `
        <tr class="hover:bg-white/[0.02] transition-colors cursor-pointer" onclick="openModal(${r.id})">
          <td class="px-4 py-3 font-mono text-xs text-gray-600">${r.id}</td>
          <td class="px-4 py-3">
            <span class="text-white font-medium">${esc(r.name)}</span>
            ${r.company ? `<br><span class="text-xs text-gray-500">${esc(r.company)}</span>` : ''}
          </td>
          <td class="px-4 py-3 text-gray-300 font-mono text-xs">${esc(r.contact)}</td>
          <td class="px-4 py-3">
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-brand-500/10 text-brand-500 border border-brand-500/20">
              ${esc(formatServiceType(r.service_type))}
            </span>
          </td>
          <td class="px-4 py-3 text-gray-400 text-xs">${esc(formatBudget(r.budget))}</td>
          <td class="px-4 py-3 text-gray-400 text-xs">${esc(formatTimeline(r.timeline))}</td>
          <td class="px-4 py-3 text-gray-500 text-xs font-mono">${formatDate(r.created_at)}</td>
          <td class="px-4 py-3 text-gray-600">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
          </td>
        </tr>`).join('')
      // Store data for modal
      window._reqData = Object.fromEntries(rows.map(r => [r.id, r]))
    }

    // ── Cards (mobile) ────────────────────────────────────────────
    function renderCards(rows) {
      const container = document.getElementById('cards-container')
      if (!rows.length) {
        container.innerHTML = `<p class="text-center text-gray-600 font-mono text-xs py-10">// no data</p>`
        return
      }
      container.innerHTML = rows.map(r => `
        <div class="bg-surface-card border border-surface-border rounded-xl p-4 cursor-pointer hover:border-brand-500/40 transition-colors" onclick="openModal(${r.id})">
          <div class="flex items-start justify-between gap-2 mb-2">
            <div>
              <span class="font-semibold text-white text-sm">${esc(r.name)}</span>
              ${r.company ? `<span class="text-xs text-gray-500 ml-2">${esc(r.company)}</span>` : ''}
            </div>
            <span class="font-mono text-xs text-gray-600 shrink-0">#${r.id}</span>
          </div>
          <span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-brand-500/10 text-brand-500 border border-brand-500/20 mb-2">
            ${esc(formatServiceType(r.service_type))}
          </span>
          <p class="text-gray-500 text-xs font-mono">${formatDate(r.created_at)}</p>
        </div>`).join('')
      if (!window._reqData) window._reqData = {}
      rows.forEach(r => { window._reqData[r.id] = r })
    }

    // ── Pagination ────────────────────────────────────────────────
    function renderPagination(total, page, limit) {
      const pages = Math.ceil(total / limit)
      const el = document.getElementById('pagination')
      if (pages <= 1) { el.innerHTML = ''; return }
      el.innerHTML = `
        <button onclick="load(${page - 1}, currentQ)" ${page <= 1 ? 'disabled' : ''}
          class="px-3 py-1.5 text-xs rounded border border-surface-border text-gray-400 hover:text-white hover:border-gray-500 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
          ← 上一頁
        </button>
        <span class="text-xs font-mono text-gray-500">第 ${page} / ${pages} 頁</span>
        <button onclick="load(${page + 1}, currentQ)" ${page >= pages ? 'disabled' : ''}
          class="px-3 py-1.5 text-xs rounded border border-surface-border text-gray-400 hover:text-white hover:border-gray-500 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
          下一頁 →
        </button>`
    }

    // ── Modal ─────────────────────────────────────────────────────
    function openModal(id) {
      const r = window._reqData?.[id]
      if (!r) return
      const body = document.getElementById('modal-body')
      body.innerHTML = `
        <div class="flex items-center gap-2 mb-1">
          <span class="font-mono text-xs text-gray-600">#${r.id}</span>
          <span class="text-gray-600">·</span>
          <span class="font-mono text-xs text-gray-500">${formatDate(r.created_at)}</span>
        </div>
        ${field('姓名', r.name)}
        ${r.company ? field('公司 / 品牌', r.company) : ''}
        ${field('聯絡方式', r.contact, 'font-mono')}
        ${field('需求類型', formatServiceType(r.service_type))}
        ${r.budget   ? field('預算區間', formatBudget(r.budget))     : ''}
        ${r.timeline ? field('預計時程', formatTimeline(r.timeline)) : ''}
        <div>
          <p class="text-xs text-gray-500 mb-1">需求簡述</p>
          <div class="bg-black/20 border border-surface-border rounded-lg p-3 text-gray-200 text-sm leading-relaxed whitespace-pre-wrap">${esc(r.message)}</div>
        </div>`
      document.getElementById('modal').classList.remove('hidden')
    }
    function field(label, value, extra = '') {
      return `<div class="flex gap-3">
        <span class="text-xs text-gray-500 w-20 shrink-0 pt-0.5">${label}</span>
        <span class="text-sm text-gray-200 ${extra}">${esc(value ?? '—')}</span>
      </div>`
    }
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal').classList.add('hidden'))
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden') })

    // ── Search ────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(() => load(1, e.target.value.trim()), 380)
    })

    // ── Init ──────────────────────────────────────────────────────
    const token = getToken()
    if (!token) {
      showError('尚未登入')
    } else {
      load(1)
    }
  </script>
</body>
</html>
