<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>驗證 Email — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script>(function(){var s=localStorage.getItem('theme');document.documentElement.classList.add(s==='light'?'theme-light':'theme-dark')})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:   { 500: "#4f6ef7", 600: "#3b55e6", 700: "#2d42cc" },
            surface: { DEFAULT: "#0e0e12", card: "#16161d", border: "#2a2a35" },
          },
          fontFamily: { sans: ["Inter", "Noto Sans TC", "sans-serif"] },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0e0e12; color: #e4e4ef; transition: background-color .3s ease, color .3s ease; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* 亮模式覆蓋（與 forgot-password.html 一致） */
    .theme-light body { background-color: #f5f6fa; color: #1a1b2e; }
    .theme-light .bg-\[\#0e0e12\] { background-color: #f0f2fa !important; }
    .theme-light .bg-\[\#0e0e12\]\/80 { background-color: rgba(245,246,250,.85) !important; }
    .theme-light .bg-\[\#16161d\] { background-color: #ffffff !important; }
    .theme-light .border-\[\#2a2a35\] { border-color: rgba(0,0,0,.10) !important; }
    .theme-light .text-white { color: #1a1b2e !important; }
    .theme-light .text-gray-400 { color: rgba(26,27,46,.65) !important; }
    .theme-light .text-gray-500 { color: rgba(26,27,46,.55) !important; }
    .theme-light .text-gray-600 { color: rgba(26,27,46,.45) !important; }
    .theme-light .hover\:text-white:hover { color: #1a1b2e !important; }
    .theme-light .bg-\[\#2a2a35\] { background-color: #e5e7eb !important; }
    .theme-light .hover\:bg-\[\#3a3a45\]:hover { background-color: #d1d5db !important; }

    /* 工具按鈕（theme + lang） */
    .tool-btn { width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; border-radius:9px; border:1px solid #2a2a35; background:transparent; color:#9ca3af; cursor:pointer; transition:background .18s ease, color .18s ease, border-color .18s ease; }
    .tool-btn:hover { background:rgba(255,255,255,.05); color:#e4e4ef; }
    .theme-light .tool-btn { border-color:rgba(0,0,0,.10); color:rgba(26,27,46,.65); }
    .theme-light .tool-btn:hover { background:rgba(0,0,0,.05); color:#1a1b2e; }
    .tool-btn svg { width:16px; height:16px; }
    .lang-wrap { position:relative; }
    .lang-menu { position:absolute; top:calc(100% + 6px); right:0; min-width:140px; background:#16161d; border:1px solid #2a2a35; border-radius:10px; padding:.35rem; display:none; box-shadow:0 12px 28px rgba(0,0,0,.35); z-index:100; }
    .lang-menu.open { display:block; }
    .theme-light .lang-menu { background:#ffffff; border-color:rgba(0,0,0,.10); box-shadow:0 12px 28px rgba(0,0,0,.10); }
    .lang-opt { display:block; width:100%; text-align:left; padding:.45rem .7rem; font-size:.825rem; color:#cbd5e1; background:transparent; border:none; border-radius:7px; cursor:pointer; }
    .lang-opt:hover { background:rgba(255,255,255,.06); color:#fff; }
    .lang-opt.active { background:rgba(79,110,247,.15); color:#7c8df9; }
    .theme-light .lang-opt { color:rgba(26,27,46,.75); }
    .theme-light .lang-opt:hover { background:rgba(0,0,0,.05); color:#1a1b2e; }
    .theme-light .lang-opt.active { background:rgba(79,110,247,.10); color:#3b55e6; }

    /* Header logo */
    .hdr-logo { height: 26px; width: auto; display: block; }
    .logo-dark, .theme-dark .logo-light { display: none !important; }
    .theme-dark .logo-dark { display: block !important; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/login.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span data-i18n="back_login">返回登入</span>
      </a>
      <a href="/" aria-label="CHIYIGO" class="flex items-center">
        <img src="/images/logo-light.png" alt="CHIYIGO" class="hdr-logo logo-light">
        <img src="/images/logo-dark.png"  alt="CHIYIGO" class="hdr-logo logo-dark">
      </a>
      <div class="flex items-center gap-2">
        <div class="lang-wrap">
          <button id="lang-btn" type="button" class="tool-btn" aria-label="Language">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m-9 9h18" />
            </svg>
          </button>
          <div id="lang-menu" class="lang-menu" role="menu">
            <button class="lang-opt" data-lang="zh-TW" role="menuitem">繁體中文</button>
            <button class="lang-opt" data-lang="en" role="menuitem">English</button>
            <button class="lang-opt" data-lang="ja" role="menuitem">日本語</button>
            <button class="lang-opt" data-lang="ko" role="menuitem">한국어</button>
          </div>
        </div>
        <button id="theme-btn" type="button" class="tool-btn" aria-label="Toggle theme">
          <svg id="theme-icon-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="theme-icon-light" class="hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md bg-[#16161d] border border-[#2a2a35] rounded-2xl p-8 shadow-xl">

      <!-- 初始：等待使用者點擊 -->
      <div id="panel-confirm" class="panel active text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-brand-500/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-xl font-bold mb-2" data-i18n="title">驗證 Email</h1>
        <p class="text-sm text-gray-400 mb-6" data-i18n="desc">請按下方按鈕完成 Email 驗證。連結 1 小時內有效，且僅能使用一次。</p>
        <button id="btn-verify" class="w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold transition-colors" data-i18n="btn_verify">
          確認驗證
        </button>
        <p id="err-missing" class="hidden mt-4 text-sm text-red-400" data-i18n="err_missing">缺少驗證 token，請從 Email 內連結再試一次。</p>
      </div>

      <!-- 處理中 -->
      <div id="panel-loading" class="panel text-center">
        <div class="w-14 h-14 mx-auto mb-4 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-gray-400" data-i18n="loading_text">驗證中…</p>
      </div>

      <!-- 成功 -->
      <div id="panel-success" class="panel text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-emerald-500/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 class="text-xl font-bold mb-2" data-i18n="success_title">Email 驗證成功</h1>
        <p class="text-sm text-gray-400 mb-6" data-i18n="success_desc">即將為你跳轉至登入頁面…</p>
        <a href="/login.html?verified=1" class="inline-block px-6 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold" data-i18n="btn_to_login">前往登入</a>
      </div>

      <!-- 失敗 -->
      <div id="panel-error" class="panel text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-500/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </div>
        <h1 class="text-xl font-bold mb-2" data-i18n="error_title">驗證失敗</h1>
        <p id="err-msg" class="text-sm text-gray-400 mb-6" data-i18n="error_desc">驗證連結已過期或已使用。請至 Dashboard 重新發送驗證信。</p>
        <a href="/dashboard.html" class="inline-block px-6 py-2.5 rounded-xl bg-[#2a2a35] hover:bg-[#3a3a45] text-white text-sm font-semibold" data-i18n="btn_to_dashboard">前往 Dashboard</a>
      </div>

    </div>
  </main>

  <script>
    // ── i18n ─────────────────────────────────────────────────────
    const I18N = {
      'zh-TW': {
        back_login:'返回登入',
        title:'驗證 Email',
        desc:'請按下方按鈕完成 Email 驗證。連結 1 小時內有效，且僅能使用一次。',
        btn_verify:'確認驗證',
        err_missing:'缺少驗證 token，請從 Email 內連結再試一次。',
        loading_text:'驗證中…',
        success_title:'Email 驗證成功',
        success_desc:'即將為你跳轉至登入頁面…',
        btn_to_login:'前往登入',
        error_title:'驗證失敗',
        error_desc:'驗證連結已過期或已使用。請至 Dashboard 重新發送驗證信。',
        btn_to_dashboard:'前往 Dashboard',
        err_default:'驗證失敗，請稍後再試。',
        err_network:'網路錯誤，請稍後再試。',
      },
      en: {
        back_login:'Back to login',
        title:'Verify Email',
        desc:'Click the button below to complete email verification. The link is valid for 1 hour and can only be used once.',
        btn_verify:'Verify',
        err_missing:'Verification token is missing. Please try the link from your email again.',
        loading_text:'Verifying…',
        success_title:'Email verified',
        success_desc:'Redirecting you to the login page…',
        btn_to_login:'Go to Login',
        error_title:'Verification failed',
        error_desc:'The verification link has expired or already been used. Please request a new one from your dashboard.',
        btn_to_dashboard:'Go to Dashboard',
        err_default:'Verification failed, please try again later.',
        err_network:'Network error, please try again later.',
      },
      ja: {
        back_login:'ログインに戻る',
        title:'メールアドレスの確認',
        desc:'下のボタンを押してメール認証を完了してください。リンクは1時間有効で、1回のみ使用できます。',
        btn_verify:'認証する',
        err_missing:'認証トークンがありません。メール内のリンクからもう一度お試しください。',
        loading_text:'認証中…',
        success_title:'メール認証が完了しました',
        success_desc:'まもなくログインページへ移動します…',
        btn_to_login:'ログインへ',
        error_title:'認証に失敗しました',
        error_desc:'認証リンクの有効期限が切れているか、既に使用されています。ダッシュボードから再送信してください。',
        btn_to_dashboard:'ダッシュボードへ',
        err_default:'認証に失敗しました。後でお試しください。',
        err_network:'ネットワークエラーです。後でお試しください。',
      },
      ko: {
        back_login:'로그인으로 돌아가기',
        title:'이메일 인증',
        desc:'아래 버튼을 눌러 이메일 인증을 완료해 주세요. 링크는 1시간 동안 유효하며 한 번만 사용할 수 있습니다.',
        btn_verify:'인증 확인',
        err_missing:'인증 토큰이 없습니다. 이메일 내 링크에서 다시 시도해 주세요.',
        loading_text:'인증 중…',
        success_title:'이메일 인증 완료',
        success_desc:'잠시 후 로그인 페이지로 이동합니다…',
        btn_to_login:'로그인으로 이동',
        error_title:'인증 실패',
        error_desc:'인증 링크가 만료되었거나 이미 사용되었습니다. 대시보드에서 다시 발송해 주세요.',
        btn_to_dashboard:'대시보드로 이동',
        err_default:'인증에 실패했습니다. 잠시 후 다시 시도해 주세요.',
        err_network:'네트워크 오류입니다. 잠시 후 다시 시도해 주세요.',
      },
    };

    function getLang() { try { return localStorage.getItem('lang') || 'zh-TW' } catch { return 'zh-TW' } }
    function T(key) { const d = I18N[getLang()] || I18N['zh-TW']; return d[key] ?? key; }

    function applyLang(lang) {
      try { localStorage.setItem('lang', lang) } catch {}
      document.documentElement.lang = lang;
      const dict = I18N[lang] || I18N['zh-TW'];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n; if (dict[k] != null) el.textContent = dict[k];
      });
      document.querySelectorAll('.lang-opt').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    }

    function applyTheme(isLight) {
      document.documentElement.classList.toggle('theme-light', isLight);
      document.documentElement.classList.toggle('theme-dark', !isLight);
      try { localStorage.setItem('theme', isLight ? 'light' : 'dark') } catch {}
      document.getElementById('theme-icon-dark').classList.toggle('hidden', isLight);
      document.getElementById('theme-icon-light').classList.toggle('hidden', !isLight);
    }

    document.addEventListener('DOMContentLoaded', () => {
      applyLang(getLang());
      applyTheme(document.documentElement.classList.contains('theme-light'));

      document.getElementById('theme-btn').addEventListener('click', () => {
        applyTheme(!document.documentElement.classList.contains('theme-light'));
      });
      const langMenu = document.getElementById('lang-menu');
      document.getElementById('lang-btn').addEventListener('click', e => {
        e.stopPropagation(); langMenu.classList.toggle('open');
      });
      langMenu.querySelectorAll('.lang-opt').forEach(opt => {
        opt.addEventListener('click', () => { applyLang(opt.dataset.lang); langMenu.classList.remove('open'); });
      });
      document.addEventListener('click', () => langMenu.classList.remove('open'));
    });

    // ── 驗證流程 ─────────────────────────────────────────────────
    (() => {
      const params = new URLSearchParams(location.search)
      const token  = params.get('token')

      const panels = {
        confirm: document.getElementById('panel-confirm'),
        loading: document.getElementById('panel-loading'),
        success: document.getElementById('panel-success'),
        error:   document.getElementById('panel-error'),
      }
      const show = name => {
        Object.values(panels).forEach(p => p.classList.remove('active'))
        panels[name].classList.add('active')
      }

      if (!token) {
        document.getElementById('btn-verify').disabled = true
        document.getElementById('btn-verify').classList.add('opacity-50', 'cursor-not-allowed')
        document.getElementById('err-missing').classList.remove('hidden')
        return
      }

      document.getElementById('btn-verify').addEventListener('click', async () => {
        show('loading')
        try {
          const r = await fetch('/api/auth/email/verify', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ token }),
          })
          const data = await r.json().catch(() => ({}))
          if (r.ok) {
            show('success')
            setTimeout(() => { location.href = '/login.html?verified=1' }, 1500)
          } else {
            // 後端錯誤：保留 backend message（已經是英/中），無對應 i18n key 時 fallback
            document.getElementById('err-msg').textContent = data.error ?? T('err_default')
            show('error')
          }
        } catch {
          document.getElementById('err-msg').textContent = T('err_network')
          show('error')
        }
      })
    })()
  </script>

</body>
</html>
