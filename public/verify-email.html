<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>驗證 Email — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script>(function(){var s=localStorage.getItem('theme');document.documentElement.classList.add(s==='light'?'theme-light':'theme-dark')})();</script>
  <link rel="stylesheet" href="/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/verify-email.css" />
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between relative">
      <a href="/login.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span data-i18n="back_login">返回登入</span>
      </a>
      <a href="/" aria-label="CHIYIGO" class="absolute left-1/2 -translate-x-1/2 flex items-center">
        <img src="/images/logo-light.png" alt="CHIYIGO" class="hdr-logo logo-light">
        <img src="/images/logo-dark.png"  alt="CHIYIGO" class="hdr-logo logo-dark">
      </a>
      <div class="flex items-center gap-2">
        <div class="lang-wrap">
          <button id="lang-btn" type="button" class="tool-btn" aria-label="Language">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m-9 9h18" />
            </svg>
          </button>
          <div id="lang-menu" class="lang-menu" role="menu">
            <button class="lang-opt" data-lang="zh-TW" role="menuitem">繁體中文</button>
            <button class="lang-opt" data-lang="en" role="menuitem">English</button>
            <button class="lang-opt" data-lang="ja" role="menuitem">日本語</button>
            <button class="lang-opt" data-lang="ko" role="menuitem">한국어</button>
          </div>
        </div>
        <button id="theme-btn" type="button" class="tool-btn" aria-label="Toggle theme">
          <svg viewBox="0 0 16 16" fill="none" class="icon-sun"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <svg viewBox="0 0 16 16" fill="none" class="icon-moon"><path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6 6 0 1 0 7 7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md bg-[#16161d] border border-[#2a2a35] rounded-2xl p-8 shadow-xl">

      <!-- 初始：等待使用者點擊 -->
      <div id="panel-confirm" class="panel active text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-brand-500/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-xl font-bold mb-2" data-i18n="title">驗證 Email</h1>
        <p class="text-sm text-gray-400 mb-6" data-i18n="desc">請按下方按鈕完成 Email 驗證。連結 1 小時內有效，且僅能使用一次。</p>
        <button id="btn-verify" class="w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold transition-colors" data-i18n="btn_verify">
          確認驗證
        </button>
        <p id="err-missing" class="hidden mt-4 text-sm text-red-400" data-i18n="err_missing">缺少驗證 token，請從 Email 內連結再試一次。</p>
      </div>

      <!-- 處理中 -->
      <div id="panel-loading" class="panel text-center">
        <div class="w-14 h-14 mx-auto mb-4 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-sm text-gray-400" data-i18n="loading_text">驗證中…</p>
      </div>

      <!-- 成功 -->
      <div id="panel-success" class="panel text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-emerald-500/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 class="text-xl font-bold mb-2" data-i18n="success_title">Email 驗證成功</h1>
        <p class="text-sm text-gray-400 mb-6" data-i18n="success_desc">即將為你跳轉至登入頁面…</p>
        <a href="/login.html?verified=1" class="inline-block px-6 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold" data-i18n="btn_to_login">前往登入</a>
      </div>

      <!-- 失敗 -->
      <div id="panel-error" class="panel text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-500/15 flex items-center justify-center">
          <svg class="w-7 h-7 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </div>
        <h1 class="text-xl font-bold mb-2" data-i18n="error_title">驗證失敗</h1>
        <p id="err-msg" class="text-sm text-gray-400 mb-6" data-i18n="error_desc">驗證連結已過期或已使用。請至 Dashboard 重新發送驗證信。</p>
        <a href="/dashboard.html" class="inline-block px-6 py-2.5 rounded-xl bg-[#2a2a35] hover:bg-[#3a3a45] text-white text-sm font-semibold" data-i18n="btn_to_dashboard">前往 Dashboard</a>
      </div>

    </div>
  </main>

  <script src="/js/verify-email.js" defer></script>

</body>
</html>
