<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 / 註冊 — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:   { 500: "#4f6ef7", 600: "#3b55e6", 700: "#2d42cc" },
            surface: { DEFAULT: "#0e0e12", card: "#16161d", border: "#2a2a35" },
          },
          fontFamily: { sans: ["Inter", "Noto Sans TC", "sans-serif"] },
          keyframes: {
            fadeUp: { "0%": { opacity:"0", transform:"translateY(20px)" }, "100%": { opacity:"1", transform:"translateY(0)" } },
            fadeIn: { "0%": { opacity:"0" }, "100%": { opacity:"1" } },
          },
          animation: {
            "fade-up": "fadeUp 0.5s ease forwards",
            "fade-in": "fadeIn 0.3s ease forwards",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0e0e12; color: #e4e4ef; }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUpIn 0.35s ease forwards; }
    @keyframes fadeUpIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #16161d inset !important; -webkit-text-fill-color: #e4e4ef !important; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- 頂部工具列 -->
  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/index.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        返回首頁
      </a>
      <span class="text-sm font-semibold text-white tracking-tight">CHIYIGO</span>
      <div class="w-20"></div><!-- 佔位對齊 -->
    </div>
  </header>

  <!-- 主體：垂直置中 -->
  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md animate-fade-up">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-4">
          <svg class="w-7 h-7 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white" id="form-title">歡迎回來</h1>
        <p class="text-gray-500 text-sm mt-1" id="form-subtitle">登入你的 CHIYIGO 帳號</p>
      </div>

      <!-- 分頁切換 -->
      <div class="flex rounded-xl bg-[#16161d] border border-[#2a2a35] p-1 mb-6" id="tab-bar">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-2 rounded-lg text-sm font-medium transition-all bg-brand-500 text-white shadow">
          登入
        </button>
        <button id="tab-register" onclick="switchTab('register')"
          class="flex-1 py-2 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
          註冊
        </button>
      </div>

      <!-- 卡片 -->
      <div class="rounded-2xl bg-[#16161d] border border-[#2a2a35] p-8 shadow-2xl">

        <!-- 錯誤 / 成功訊息 -->
        <div id="msg-box" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <!-- ── 登入表單 ── -->
        <form id="form-login" class="panel active" onsubmit="handleLogin(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">電子信箱</label>
              <input id="login-email" type="email" autocomplete="email" required
                placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">密碼</label>
              <div class="relative">
                <input id="login-password" type="password" autocomplete="current-password" required
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" id="login-eye"
                  onclick="togglePassword('login-password', 'login-eye')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1">
                  <svg id="login-eye-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <button type="submit" id="login-btn"
            class="mt-6 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100">
            登入
          </button>
          <div class="text-right mt-2">
            <a href="/forgot-password.html" class="text-xs text-gray-500 hover:text-brand-500 transition-colors">忘記密碼？</a>
          </div>
          <div class="flex items-center gap-3 my-4">
            <div class="flex-1 h-px bg-[#2a2a35]"></div>
            <span class="text-xs text-gray-600">或</span>
            <div class="flex-1 h-px bg-[#2a2a35]"></div>
          </div>
          <a href="/api/auth/discord/init?platform=web"
            class="flex items-center justify-center gap-2.5 w-full py-3 rounded-xl bg-[#5865F2]/10 hover:bg-[#5865F2]/20 border border-[#5865F2]/25 text-[#7289da] font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98]">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
            以 Discord 登入
          </a>
        </form>

        <!-- ── 註冊表單 ── -->
        <form id="form-register" class="panel" onsubmit="handleRegister(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">電子信箱</label>
              <input id="reg-email" type="email" autocomplete="email" required
                placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">密碼 <span class="text-gray-600">（最少 8 字元）</span></label>
              <div class="relative">
                <input id="reg-password" type="password" autocomplete="new-password" required minlength="8"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" id="reg-eye"
                  onclick="togglePassword('reg-password', 'reg-eye')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1">
                  <svg id="reg-eye-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">確認密碼</label>
              <div class="relative">
                <input id="reg-confirm" type="password" autocomplete="new-password" required minlength="8"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" id="reg-confirm-eye"
                  onclick="togglePassword('reg-confirm', 'reg-confirm-eye')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1">
                  <svg id="reg-confirm-eye-icon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <button type="submit" id="reg-btn"
            class="mt-6 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100">
            建立帳號
          </button>
          <div class="flex items-center gap-3 my-4">
            <div class="flex-1 h-px bg-[#2a2a35]"></div>
            <span class="text-xs text-gray-600">或</span>
            <div class="flex-1 h-px bg-[#2a2a35]"></div>
          </div>
          <a href="/api/auth/discord/init?platform=web"
            class="flex items-center justify-center gap-2.5 w-full py-3 rounded-xl bg-[#5865F2]/10 hover:bg-[#5865F2]/20 border border-[#5865F2]/25 text-[#7289da] font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98]">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
            以 Discord 繼續
          </a>
          <p class="mt-4 text-xs text-center text-gray-600">
            建立帳號即代表你同意我們的服務條款與隱私政策。
          </p>
        </form>

        <!-- ── 2FA 驗證面板 ── -->
        <form id="form-totp" class="panel" onsubmit="handleTotp(event)">
          <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-brand-500/10 border border-brand-500/20 mb-3">
              <svg class="w-6 h-6 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
              </svg>
            </div>
            <p class="text-sm text-gray-400">請輸入驗證器 App 顯示的 6 位數字，<br />或使用備用救援碼。</p>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">驗證碼</label>
            <input id="totp-code" type="text" inputmode="numeric"
              placeholder="000000 或 備用救援碼"
              autocomplete="one-time-code"
              class="w-full px-4 py-3 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm text-center tracking-widest transition" />
          </div>
          <button type="submit" id="totp-btn"
            class="mt-5 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100">
            驗證
          </button>
          <button type="button" onclick="switchTab('login')"
            class="mt-3 w-full py-2 text-xs text-gray-500 hover:text-gray-300 transition">
            ← 返回登入
          </button>
        </form>

      </div>

      <!-- PKCE 模式提示（正常模式下隱藏） -->
      <p id="pkce-notice" class="hidden text-center text-xs text-amber-500/80 mt-4 border border-amber-500/20 rounded-lg px-4 py-2 bg-amber-500/5">
        你正在授權 CHIYIGO 應用程式登入。登入後將自動返回 App。
      </p>

      <!-- 底部裝飾文字 -->
      <p class="text-center text-xs text-gray-600 mt-6">
        你的資料由 CHIYIGO 安全保管，100% 資料主權。
      </p>
    </div>
  </main>

  <script src="/js/auth-ui.js?v=6"></script>
  <script>
    // 從 verify / reset-password 跳轉回來時顯示提示
    (function () {
      const p = new URLSearchParams(location.search)
      if (p.has('verified')) {
        showNotice(
          '✓ Email 驗證成功！請登入你的帳號。',
          'bg-green-500/10 border-green-500/20 text-green-400'
        )
        history.replaceState(null, '', '/login.html')
      } else if (p.has('verify_error')) {
        showNotice(
          '驗證連結無效或已過期，請重新申請。',
          'bg-red-500/10 border-red-500/20 text-red-400'
        )
        history.replaceState(null, '', '/login.html')
      } else if (p.has('password_reset')) {
        showNotice(
          '✓ 密碼重設成功！請使用新密碼登入。',
          'bg-green-500/10 border-green-500/20 text-green-400'
        )
        history.replaceState(null, '', '/login.html')
      }

      function showNotice(text, cls) {
        const el = document.createElement('div')
        el.textContent = text
        el.className = `text-sm font-medium px-4 py-3 rounded-xl border mb-4 ${cls}`
        // 插入到卡片上方（不在卡片內，避免被 p-8 擠壓變窄）
        const card = document.querySelector('.rounded-2xl')
        if (card) card.insertAdjacentElement('beforebegin', el)
      }
    })()
  </script>
</body>
</html>
