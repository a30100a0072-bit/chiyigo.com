<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重設密碼 — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:   { 500: "#4f6ef7", 600: "#3b55e6", 700: "#2d42cc" },
            surface: { DEFAULT: "#0e0e12", card: "#16161d", border: "#2a2a35" },
          },
          fontFamily: { sans: ["Inter", "Noto Sans TC", "sans-serif"] },
          keyframes: {
            fadeUp: { "0%": { opacity:"0", transform:"translateY(20px)" }, "100%": { opacity:"1", transform:"translateY(0)" } },
            fadeIn: { "0%": { opacity:"0" }, "100%": { opacity:"1" } },
          },
          animation: {
            "fade-up": "fadeUp 0.5s ease forwards",
            "fade-in": "fadeIn 0.3s ease forwards",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0e0e12; color: #e4e4ef; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #16161d inset !important; -webkit-text-fill-color: #e4e4ef !important; }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUpIn 0.3s ease forwards; }
    @keyframes fadeUpIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- 頂部工具列 -->
  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/login.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        返回登入
      </a>
      <span class="text-sm font-semibold text-white tracking-tight">CHIYIGO</span>
      <div class="w-20"></div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md animate-fade-up">

      <!-- 圖示 + 標題 -->
      <div class="text-center mb-8">
        <div id="header-icon" class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-4">
          <svg class="w-7 h-7 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </div>
        <h1 id="page-title" class="text-2xl font-bold text-white">重設密碼</h1>
        <p id="page-subtitle" class="text-gray-500 text-sm mt-1">請輸入你的新密碼</p>
      </div>

      <!-- 卡片 -->
      <div class="rounded-2xl bg-[#16161d] border border-[#2a2a35] p-8 shadow-2xl">

        <!-- 訊息區 -->
        <div id="msg-box" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <!-- ── 面板 1：密碼輸入 ── -->
        <form id="panel-password" class="panel active" onsubmit="handlePasswordSubmit(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">新密碼 <span class="text-gray-600">（最少 8 字元）</span></label>
              <div class="relative">
                <input id="new-password" type="password" autocomplete="new-password" required minlength="8"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" onclick="togglePwd('new-password', 'eye-new')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1">
                  <svg id="eye-new" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">確認新密碼</label>
              <div class="relative">
                <input id="confirm-password" type="password" autocomplete="new-password" required minlength="8"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" onclick="togglePwd('confirm-password', 'eye-confirm')"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1">
                  <svg id="eye-confirm" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <button type="submit" id="pwd-btn"
            class="mt-6 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100">
            重設密碼
          </button>
        </form>

        <!-- ── 面板 2：2FA 驗證 ── -->
        <form id="panel-2fa" class="panel" onsubmit="handle2faSubmit(event)">
          <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-brand-500/10 border border-brand-500/20 mb-3">
              <svg class="w-6 h-6 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
              </svg>
            </div>
            <p class="text-sm text-gray-400">此帳號已啟用雙重驗證<br/>請輸入驗證碼後繼續重設密碼</p>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">驗證碼</label>
            <input id="totp-code" type="text" inputmode="numeric"
              placeholder="000000 或 備用救援碼"
              autocomplete="one-time-code"
              class="w-full px-4 py-3 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm text-center tracking-widest transition" />
          </div>
          <button type="submit" id="totp-btn"
            class="mt-5 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100">
            驗證並重設密碼
          </button>
          <button type="button" onclick="showPanel('panel-password')"
            class="mt-3 w-full py-2 text-xs text-gray-500 hover:text-gray-300 transition">
            ← 重新輸入新密碼
          </button>
        </form>

        <!-- ── 面板 3：成功 ── -->
        <div id="panel-success" class="panel text-center py-2">
          <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-green-500/10 border border-green-500/20 mb-4">
            <svg class="w-6 h-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
          </div>
          <p class="text-white font-semibold mb-1">密碼重設成功</p>
          <p class="text-gray-500 text-sm">所有裝置的登入階段已撤銷，請重新登入。</p>
          <p class="text-gray-600 text-xs mt-3">
            <span id="countdown">3</span> 秒後自動跳轉…
          </p>
        </div>

        <!-- ── 面板 4：Token 無效 ── -->
        <div id="panel-invalid" class="panel text-center py-2">
          <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 mb-4">
            <svg class="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
          </div>
          <p class="text-white font-semibold mb-1">連結無效或已過期</p>
          <p class="text-gray-500 text-sm">重設連結僅能使用一次，且有效期為 1 小時。</p>
          <a href="/forgot-password.html"
            class="inline-block mt-6 px-6 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98]">
            重新申請重設連結
          </a>
        </div>

      </div>

      <p class="text-center text-xs text-gray-600 mt-6">
        你的資料由 CHIYIGO 安全保管，100% 資料主權。
      </p>
    </div>
  </main>

  <script>
    // ── 狀態 ─────────────────────────────────────────────────────
    const token      = new URLSearchParams(location.search).get('token') ?? ''
    let   newPassword = ''

    // ── 頁面初始化 ───────────────────────────────────────────────
    if (!token) showPanel('panel-invalid')

    // ── 工具函式 ─────────────────────────────────────────────────
    function showPanel(id) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
      document.getElementById(id).classList.add('active')
      setMsg('')
    }

    function setMsg(text, type = 'error') {
      const box = document.getElementById('msg-box')
      if (!text) { box.classList.add('hidden'); return }
      box.textContent = text
      box.className = type === 'error'
        ? 'mb-5 px-4 py-3 rounded-lg text-sm font-medium bg-red-500/10 border border-red-500/20 text-red-400'
        : 'mb-5 px-4 py-3 rounded-lg text-sm font-medium bg-green-500/10 border border-green-500/20 text-green-400'
    }

    function togglePwd(inputId, iconId) {
      const input = document.getElementById(inputId)
      const icon  = document.getElementById(iconId)
      const show  = input.type === 'password'
      input.type  = show ? 'text' : 'password'
      icon.style.opacity = show ? '0.5' : '1'
    }

    // ── 面板 1：密碼提交 ─────────────────────────────────────────
    async function handlePasswordSubmit(e) {
      e.preventDefault()
      const pwd     = document.getElementById('new-password').value
      const confirm = document.getElementById('confirm-password').value
      const btn     = document.getElementById('pwd-btn')

      if (pwd !== confirm) { setMsg('兩次輸入的密碼不一致。'); return }
      if (pwd.length < 8)  { setMsg('密碼至少需要 8 個字元。'); return }

      newPassword = pwd
      await submitReset(btn, 'pwd-btn', null)
    }

    // ── 面板 2：2FA 提交 ──────────────────────────────────────────
    async function handle2faSubmit(e) {
      e.preventDefault()
      const code = document.getElementById('totp-code').value.trim()
      const btn  = document.getElementById('totp-btn')

      if (!code) { setMsg('請輸入驗證碼。'); return }
      await submitReset(btn, 'totp-btn', code)
    }

    // ── 共用送出邏輯 ─────────────────────────────────────────────
    async function submitReset(btn, btnId, totpCode) {
      btn.disabled    = true
      btn.textContent = '處理中…'
      setMsg('')

      const body = { token, new_password: newPassword }
      if (totpCode) body.totp_code = totpCode

      try {
        const res  = await fetch('/api/auth/local/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body),
        })
        const data = await res.json().catch(() => ({}))

        if (res.ok) {
          showPanel('panel-success')
          startCountdown()
          return
        }

        // 403 requires_2fa → 切換到 2FA 面板
        if (res.status === 403 && data.requires_2fa) {
          showPanel('panel-2fa')
          document.getElementById('totp-code').focus()
          return
        }

        // token 無效 / 已過期
        if (res.status === 400 && data.error?.includes('invalid or has expired')) {
          showPanel('panel-invalid')
          return
        }

        setMsg(data.error ?? '發生錯誤，請稍後再試。')
      } catch {
        setMsg('網路錯誤，請檢查連線後重試。')
      } finally {
        btn.disabled    = false
        btn.textContent = btnId === 'pwd-btn' ? '重設密碼' : '驗證並重設密碼'
      }
    }

    // ── 成功倒數跳轉 ─────────────────────────────────────────────
    function startCountdown() {
      let sec = 3
      const el = document.getElementById('countdown')
      const iv = setInterval(() => {
        sec--
        el.textContent = sec
        if (sec <= 0) { clearInterval(iv); location.href = '/login.html?password_reset=1' }
      }, 1000)
    }
  </script>
</body>
</html>
