<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重設密碼 — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script>(function(){var s=localStorage.getItem('theme');document.documentElement.classList.add(s==='light'?'theme-light':'theme-dark')})();</script>
  <link rel="stylesheet" href="/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0e0e12; color: #e4e4ef; transition: background-color .3s ease, color .3s ease; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #16161d inset !important; -webkit-text-fill-color: #e4e4ef !important; }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUpIn 0.3s ease forwards; }
    @keyframes fadeUpIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Light theme overrides */
    .theme-light body { background-color: #f5f6fa; color: #1a1b2e; }
    .theme-light .bg-\[\#0e0e12\] { background-color: #f0f2fa !important; }
    .theme-light .bg-\[\#0e0e12\]\/80 { background-color: rgba(245,246,250,.85) !important; }
    .theme-light .bg-\[\#16161d\] { background-color: #ffffff !important; }
    .theme-light .border-\[\#2a2a35\] { border-color: rgba(0,0,0,.10) !important; }
    .theme-light .text-white { color: #1a1b2e !important; }
    .theme-light .text-gray-400 { color: rgba(26,27,46,.65) !important; }
    .theme-light .text-gray-500 { color: rgba(26,27,46,.55) !important; }
    .theme-light .text-gray-600 { color: rgba(26,27,46,.45) !important; }
    .theme-light .placeholder-gray-600::placeholder { color: rgba(26,27,46,.40) !important; }
    .theme-light input:-webkit-autofill { -webkit-box-shadow: 0 0 0 40px #ffffff inset !important; -webkit-text-fill-color: #1a1b2e !important; }
    .theme-light .hover\:text-white:hover { color: #1a1b2e !important; }
    .theme-light .hover\:text-gray-300:hover { color: rgba(26,27,46,.75) !important; }

    /* Top toolbar buttons */
    .tool-btn { width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; border-radius:9px; border:1px solid #2a2a35; background:transparent; color:#9ca3af; cursor:pointer; transition:background .18s ease, color .18s ease, border-color .18s ease; }
    .tool-btn:hover { background:rgba(255,255,255,.05); color:#e4e4ef; }
    .theme-light .tool-btn { border-color:rgba(0,0,0,.10); color:rgba(26,27,46,.65); }
    .theme-light .tool-btn:hover { background:rgba(0,0,0,.05); color:#1a1b2e; }
    .tool-btn svg { width:16px; height:16px; }
    .lang-wrap { position:relative; }
    .lang-menu { position:absolute; top:calc(100% + 6px); right:0; min-width:140px; background:#16161d; border:1px solid #2a2a35; border-radius:10px; padding:.35rem; display:none; box-shadow:0 12px 28px rgba(0,0,0,.35); z-index:100; }
    .lang-menu.open { display:block; }
    .theme-light .lang-menu { background:#ffffff; border-color:rgba(0,0,0,.10); box-shadow:0 12px 28px rgba(0,0,0,.10); }
    .lang-opt { display:block; width:100%; text-align:left; padding:.45rem .7rem; font-size:.825rem; color:#cbd5e1; background:transparent; border:none; border-radius:7px; cursor:pointer; }
    .lang-opt:hover { background:rgba(255,255,255,.06); color:#fff; }
    .lang-opt.active { background:rgba(79,110,247,.15); color:#7c8df9; }
    .theme-light .lang-opt { color:rgba(26,27,46,.75); }
    .theme-light .lang-opt:hover { background:rgba(0,0,0,.05); color:#1a1b2e; }
    .theme-light .lang-opt.active { background:rgba(79,110,247,.10); color:#3b55e6; }

    /* Header logo (隨光暗切換) */
    .hdr-logo { height: 26px; width: auto; display: block; }
    .logo-dark, .theme-dark .logo-light { display: none !important; }
    .theme-dark .logo-dark { display: block !important; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- 頂部工具列 -->
  <header class="fixed top-0 inset-x-0 z-50 border-b border-[#2a2a35] bg-[#0e0e12]/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between relative">
      <a href="/login.html" class="flex items-center gap-2 text-gray-400 hover:text-white text-sm transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span data-i18n="back_login">返回登入</span>
      </a>
      <a href="/" aria-label="CHIYIGO" class="absolute left-1/2 -translate-x-1/2 flex items-center">
        <img src="/images/logo-light.png" alt="CHIYIGO" class="hdr-logo logo-light">
        <img src="/images/logo-dark.png"  alt="CHIYIGO" class="hdr-logo logo-dark">
      </a>
      <div class="flex items-center gap-2">
        <div class="lang-wrap">
          <button id="lang-btn" type="button" class="tool-btn" aria-label="Language">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m-9 9h18" />
            </svg>
          </button>
          <div id="lang-menu" class="lang-menu" role="menu">
            <button class="lang-opt" data-lang="zh-TW" role="menuitem">繁體中文</button>
            <button class="lang-opt" data-lang="en" role="menuitem">English</button>
            <button class="lang-opt" data-lang="ja" role="menuitem">日本語</button>
            <button class="lang-opt" data-lang="ko" role="menuitem">한국어</button>
          </div>
        </div>
        <button id="theme-btn" type="button" class="tool-btn" aria-label="Toggle theme">
          <svg id="theme-icon-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <svg id="theme-icon-light" class="hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-14">
    <div class="w-full max-w-md animate-fade-up">

      <!-- 圖示 + 標題 -->
      <div class="text-center mb-8 mt-6">
        <div id="header-icon" class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500/10 border border-brand-500/20 mb-4">
          <svg class="w-7 h-7 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </div>
        <h1 id="page-title" class="text-2xl font-bold text-white" data-i18n="title">重設密碼</h1>
        <p id="page-subtitle" class="text-gray-500 text-sm mt-1" data-i18n="subtitle">請輸入你的新密碼</p>
      </div>

      <!-- 卡片 -->
      <div class="rounded-2xl bg-[#16161d] border border-[#2a2a35] p-8 shadow-2xl">

        <!-- 訊息區 -->
        <div id="msg-box" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

        <!-- ── 面板 1：密碼輸入 ── -->
        <form id="panel-password" class="panel active">
          <div class="space-y-4">
            <div>
              <label for="new-password" class="block text-xs font-medium text-gray-400 mb-1.5">
                <span data-i18n="lbl_new_pwd">新密碼</span>
              </label>
              <p class="text-xs text-gray-400 mb-2 leading-relaxed" data-i18n="pwd_rule">密碼需 ≥12 字元，或 ≥8 字元並包含「大寫、小寫、數字、符號」其中任 3 類。</p>
              <div class="relative">
                <input id="new-password" type="password" autocomplete="new-password" required minlength="8"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" data-toggle-pwd="new-password" data-toggle-eye="eye-new"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1" aria-label="Toggle password">
                  <svg id="eye-new" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label for="confirm-password" class="block text-xs font-medium text-gray-400 mb-1.5" data-i18n="lbl_confirm_pwd">確認新密碼</label>
              <div class="relative">
                <input id="confirm-password" type="password" autocomplete="new-password" required minlength="8"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 pr-12 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm transition" />
                <button type="button" data-toggle-pwd="confirm-password" data-toggle-eye="eye-confirm"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition p-1" aria-label="Toggle password">
                  <svg id="eye-confirm" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <button type="submit" id="pwd-btn"
            class="mt-6 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100" data-i18n="btn_reset">
            重設密碼
          </button>
        </form>

        <!-- ── 面板 2：2FA 驗證 ── -->
        <form id="panel-2fa" class="panel">
          <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-brand-500/10 border border-brand-500/20 mb-3">
              <svg class="w-6 h-6 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
              </svg>
            </div>
            <p class="text-sm text-gray-400" data-i18n-html="tfa_hint">此帳號已啟用雙重驗證<br/>請輸入驗證碼後繼續重設密碼</p>
          </div>
          <div>
            <label for="totp-code" class="block text-xs font-medium text-gray-400 mb-1.5" data-i18n="lbl_otp">驗證碼</label>
            <input id="totp-code" type="text" inputmode="numeric"
              placeholder="000000 或 備用救援碼" data-i18n-ph="ph_otp"
              autocomplete="one-time-code"
              class="w-full px-4 py-3 rounded-xl bg-[#0e0e12] border border-[#2a2a35] focus:border-brand-500/60 focus:outline-none focus:ring-2 focus:ring-brand-500/20 text-white placeholder-gray-600 text-sm text-center tracking-widest transition" />
          </div>
          <button type="submit" id="totp-btn"
            class="mt-5 w-full py-3 rounded-xl bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100" data-i18n="btn_verify_reset">
            驗證並重設密碼
          </button>
          <button type="button" data-show-panel="panel-password"
            class="mt-3 w-full py-2 text-xs text-gray-500 hover:text-gray-300 transition" data-i18n="btn_back_pwd">
            ← 重新輸入新密碼
          </button>
        </form>

        <!-- ── 面板 3：成功 ── -->
        <div id="panel-success" class="panel text-center py-2">
          <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-green-500/10 border border-green-500/20 mb-4">
            <svg class="w-6 h-6 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
          </div>
          <p class="text-white font-semibold mb-1" data-i18n="success_title">密碼重設成功</p>
          <p class="text-gray-500 text-sm" data-i18n="success_desc">所有裝置的登入階段已撤銷，請重新登入。</p>
          <p class="text-gray-600 text-xs mt-3">
            <span id="countdown">3</span> <span data-i18n="countdown_suffix">秒後自動跳轉…</span>
          </p>
        </div>

        <!-- ── 面板 4：Token 無效 ── -->
        <div id="panel-invalid" class="panel text-center py-2">
          <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 mb-4">
            <svg class="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
          </div>
          <p class="text-white font-semibold mb-1" data-i18n="invalid_title">連結無效或已過期</p>
          <p class="text-gray-500 text-sm" data-i18n="invalid_desc">重設連結僅能使用一次，且有效期為 1 小時。</p>
          <a href="/forgot-password.html"
            class="inline-block mt-6 px-6 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-white font-semibold text-sm transition-all hover:scale-[1.02] active:scale-[0.98]" data-i18n="btn_request_new">
            重新申請重設連結
          </a>
        </div>

      </div>

      <p class="text-center text-xs text-gray-600 mt-6" data-i18n="footer_note">
        你的資料由 CHIYIGO 安全保管，100% 資料主權。
      </p>
    </div>
  </main>

  <script src="/js/reset-password.js" defer></script>
</body>
</html>
