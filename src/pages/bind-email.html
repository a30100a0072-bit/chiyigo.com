<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>補填信箱 — CHIYIGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "be8c93305dda4f16b57c925bc681b2f6"}'></script>
  <script>(function(){var s=localStorage.getItem('theme');document.documentElement.classList.add(s==='light'?'theme-light':'theme-dark')})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/_tokens.css" />
  <link rel="stylesheet" href="/css/_components.css" />
  <link rel="stylesheet" href="/css/login.css" />
  <link rel="stylesheet" href="/css/bind-email.css" />
  <script defer src="/js/notify.js"></script>
  <script defer src="/js/confirm-dialog.js"></script>
</head>
<body>

  <div class="dash-wrap">
    {{> sidebar-public-other pathPrefix="/"}}
    <div class="dash-main">
      <main class="dash-content">
        <div class="login-center">
          <div class="login-wrap">

            <div class="lp-logo-wrap">
              <div class="lp-logo-icon">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                </svg>
              </div>
              <h1 class="lp-title" data-i18n="title">補填信箱</h1>
              <p class="lp-subtitle" data-i18n="subtitle">你的帳號尚未綁定信箱，請輸入以完成登入</p>
            </div>

            <div class="card">
              <div id="msg-box" class="msg-box"></div>

              <!-- 面板 1：信箱輸入 -->
              <form id="panel-form" class="panel active">
                <div class="field-wrap">
                  <label for="email-input" class="field-label" data-i18n="lbl_email">電子信箱</label>
                  <input id="email-input" type="email" autocomplete="email" required placeholder="you@example.com" class="field-input" />
                </div>
                <button type="submit" id="submit-btn" class="submit-btn" data-i18n="btn_submit">確認並登入</button>
                <p class="notice-text" data-i18n="hint_purpose">此信箱將用於帳號識別與安全通知。</p>
              </form>

              <!-- 面板 2：連結無效 -->
              <div id="panel-invalid" class="panel error-state">
                <div class="error-icon-wrap">
                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                  </svg>
                </div>
                <p class="error-title" data-i18n="invalid_title">連結無效或已過期</p>
                <p class="error-desc" data-i18n="invalid_desc">此連結僅能使用一次，且有效期為 10 分鐘。</p>
                <a href="/login.html" class="submit-btn success-back-btn" data-i18n="btn_relogin">重新登入</a>
              </div>

            </div>

            <p class="notice-text notice-text-spaced" data-i18n="footer_note">
              你的資料由 CHIYIGO 安全保管，100% 資料主權。
            </p>

          </div>
        </div>
      </main>
    </div>
  </div>

  {{> topbar-mobile pathPrefix="/" brandHref="/index.html" loginHref="/login.html" loginLabel="會員登入"}}

  <div class="m-overlay" id="m-overlay">
    <div class="m-ov-wrap">
      <div class="m-ov-handle"></div>
      <div class="m-ov-head">
        <div class="m-ov-brand">
          <img src="/images/logo-light.png" alt="CHIYIGO" class="m-ov-logo-img logo-light">
          <img src="/images/logo-dark.png"  alt="CHIYIGO" class="m-ov-logo-img logo-dark">
        </div>
        <div class="m-ov-status">
          <span class="m-ov-status-dot"></span>
          <span class="m-ov-status-txt" data-i18n="status_open">接案中</span>
        </div>
      </div>
      <nav class="m-ov-nav">
        <a href="/index.html" class="m-ov-item" data-stagger="0">
          <div class="m-ov-icon-wrap"><svg class="m-ov-icon" viewBox="0 0 16 16" fill="none"><path d="M2 9L8 3l6 6v6H10v-4H6v4H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/></svg></div>

        </a>
        <a href="/index.html#services" class="m-ov-item" data-stagger="1">
          <div class="m-ov-icon-wrap"><svg class="m-ov-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/></svg></div>
          <span class="m-ov-label" data-i18n="nav_services">服務項目</span>
          <svg class="m-ov-chevron" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="/index.html#process" class="m-ov-item" data-stagger="2">
          <div class="m-ov-icon-wrap"><svg class="m-ov-icon" viewBox="0 0 16 16" fill="none"><path d="M4 5h9M4 8h9M4 11h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="2.2" cy="5" r="0.9" fill="currentColor"/><circle cx="2.2" cy="8" r="0.9" fill="currentColor"/><circle cx="2.2" cy="11" r="0.9" fill="currentColor"/></svg></div>

          <svg class="m-ov-chevron" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="/portfolio.html" class="m-ov-item" data-stagger="3">

          <span class="m-ov-label" data-i18n="nav_portfolio">案例作品</span>
          <svg class="m-ov-chevron" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="/about.html" class="m-ov-item" data-stagger="4">
          <div class="m-ov-icon-wrap"><svg class="m-ov-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M2 14.5a6 6 0 0 1 12 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg></div>
          <span class="m-ov-label" data-i18n="nav_about">關於我們</span>
          <svg class="m-ov-chevron" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="/requisition.html" class="m-ov-item" data-stagger="5">
          <div class="m-ov-icon-wrap"><svg class="m-ov-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="3.5" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M2 5.5l6 4.5 6-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>
          <span class="m-ov-label" data-i18n="nav_contact">接案諮詢</span>
          <svg class="m-ov-chevron" viewBox="0 0 6 10" fill="none"><path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </nav>
      <div class="m-ov-cta">
        <a href="/requisition.html" class="m-ov-cta-btn" data-i18n="cta_btn_m">開始諮詢 →</a>
        <div class="m-ov-lang-row">
          <button class="m-ov-lang-opt active" data-lang="zh-TW">繁中</button>
          <button class="m-ov-lang-opt" data-lang="en">EN</button>
          <button class="m-ov-lang-opt" data-lang="ja">日本語</button>
          <button class="m-ov-lang-opt" data-lang="ko">한국어</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/sidebar-auth.js" defer></script>
  <script src="/js/bind-email.js?v=p125" defer></script>
</body>
</html>
