name: Strict Leaf Governance (open-strict override)

# PR-0 (Stage 7 strict zero-error gate): manual governance gate for an
# open-strict PR. The normal ci.yml ratchet step is expected RED for such a
# PR (it raises the baseline past base-derived guards); this dispatch run is
# the gate of record. RATCHET_ALLOW_BASELINE_RAISE + RATCHET_BASE_REF are
# injected here only (ci.yml never carries them). See
# docs/plans/stage7-strict-zero-error.md sections 3.4 / 3.6.

on:
  workflow_dispatch:
    inputs:
      leaf:
        description: 'Solution leaf opening strict'
        required: true
        type: choice
        options:
          - functions
          - scripts
          - tests
          - browser-typecheck
      reason:
        description: 'Governance reason (logged in [OVERRIDE] + governance-exceptions.md)'
        required: true
        type: string
      base_ref:
        description: 'Fork-point commit on main (its baseline.errorCount MUST be 0)'
        required: true
        type: string

jobs:
  governance-ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 需完整歷史讓 base_ref 可 resolve（ratchet getBaseRef / getDiff / readBaseBaseline 都用它）
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify base_ref (hex SHA + resolvable + main fork-point, anti-spoof)
        # workflow_dispatch input 是 free string → 經 env 傳入、不直接插 shell，避免 injection。
        # T0：先驗 hex SHA 格式 + 可 resolve（否則 ratchet getBaseRef 在 CI exit 3）。
        # anti-spoof：base_ref 必須 == merge-base(HEAD, origin/main)，否則可挑 branch 內較晚的
        #   commit 當 base_ref，讓 P1 的 base..HEAD diff 排除前面已做的 source 變更。
        env:
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          case "$BASE_REF" in
            ''|*[!0-9a-fA-F]*) echo "FAIL: base_ref must be a hex commit SHA"; exit 1 ;;
          esac
          if [ "${#BASE_REF}" -lt 7 ] || [ "${#BASE_REF}" -gt 40 ]; then
            echo "FAIL: base_ref length must be 7..40 hex chars"; exit 1
          fi
          git rev-parse --verify "$BASE_REF^{commit}"
          git fetch --no-tags origin main
          MERGE_BASE="$(git merge-base HEAD origin/main)"
          RESOLVED="$(git rev-parse "$BASE_REF^{commit}")"
          echo "merge-base(HEAD,origin/main)=$MERGE_BASE  base_ref=$RESOLVED"
          if [ "$RESOLVED" != "$MERGE_BASE" ]; then
            echo "FAIL: base_ref must equal merge-base(HEAD, origin/main)"; exit 1
          fi

      - name: Ratchet with locked override
        run: npm run typecheck:ratchet
        env:
          RATCHET_BASE_REF: ${{ inputs.base_ref }}
          RATCHET_ALLOW_BASELINE_RAISE: ${{ inputs.reason }}
