name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run unit tests with coverage (functions/utils ≥ 80%)
        run: npm run test:cov

      - name: Run integration tests (workerd + D1, includes migration smoke)
        run: npm run test:int

      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false
