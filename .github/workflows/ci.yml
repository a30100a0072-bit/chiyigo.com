name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # typecheck-ratchet 需要 git diff base...HEAD，fetch-depth=0 取整個歷史
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck ratchet (JS→TS day-1 gate)
        run: npm run typecheck:ratchet
        env:
          # PR: pull_request.base.sha 是 merge base；push: github.event.before 是 push 前的 tip
          # 兩者都不在時，script fallback HEAD~1（防 origin/main == HEAD 的 push case）
          RATCHET_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Verify browser pipeline (Stage 4.5a canary)
        # 驗 tsconfig.browser-classic.json + tsconfig.browser-module.json 真能 emit ；
        # classic 不插 ESM 結構（防 <script> SyntaxError），module 含 export 形狀。
        run: npm run verify:browser-pipeline

      - name: Run unit tests with coverage (functions/utils ≥ 80%)
        run: npm run test:cov

      - name: Run integration tests (workerd + D1, includes migration smoke)
        run: npm run test:int

      - name: Pages Functions bundle gate (deploy-equivalent)
        # tsc/Vitest 綠 ≠ wrangler bundle 綠；codex 2026-05-16 review Finding 4。
        # 防 JS→TS 遷移期 extensionless import / .ts 路由載入造成 bundle-only regression。
        run: npm run build:functions

      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false
