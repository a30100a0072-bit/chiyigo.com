name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2d2c4b4ddbddec1a5d045533c01d715f
          # 明示 --commit-message / --commit-hash 用 ASCII，避開 wrangler 把
          # 中文 commit message 傳給 Cloudflare API 時編碼出錯（code 8000111）
          command: pages deploy public --project-name chiyigo-com --branch main --commit-hash ${{ github.sha }} --commit-message "deploy ${{ github.sha }}"

